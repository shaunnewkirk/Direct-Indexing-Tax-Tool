<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Direct Indexing Tax Alpha Explorer</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --soft: #f1f5f9;
      --dark: #020617;
      --good-bg: #ecfdf5;
      --good-line: #a7f3d0;
      --bad-bg: #fff1f2;
      --bad-line: #fecdd3;
      --green: #059669;
      --red: #dc2626;
      --amber-bg: #fffbeb;
      --amber-line: #fde68a;
      --amber-ink: #78350f;
      --blue-bg: #eff6ff;
      --blue-line: #bfdbfe;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, input, select { font: inherit; }

    .page {
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: var(--dark);
      color: white;
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.20);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      padding: 6px 12px;
      color: #cbd5e1;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    h1 {
      margin: 14px 0 0;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .hero p {
      margin: 16px 0 0;
      max-width: 840px;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .scenario {
      min-width: 290px;
      border-radius: 22px;
      background: rgba(255,255,255,0.10);
      padding: 18px;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.7;
    }

    .scenario strong { color: white; display: block; }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .action-btn,
    .mode-btn,
    .preset-btn {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      color: white;
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 12px;
      font-weight: 850;
      cursor: pointer;
    }

    .mode-btn.active,
    .action-btn.light {
      background: white;
      color: var(--dark);
      border-color: white;
    }

    .share-status {
      color: #cbd5e1;
      font-size: 12px;
      align-self: center;
    }

    .layout {
      display: grid;
      grid-template-columns: 410px 1fr;
      gap: 24px;
      margin-top: 24px;
      align-items: start;
    }

    .stack { display: grid; gap: 24px; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
    }

    .card.translucent { background: rgba(255,255,255,0.72); }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .section-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: -0.025em;
    }

    .section-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .reset {
      border: 1px solid var(--line);
      background: white;
      color: #334155;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(15, 23, 42, 0.05);
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .preset-card {
      align-self: start;
    }

    .preset-tile {
      border: 1px solid var(--line);
      background: white;
      border-radius: 18px;
      padding: 10px 11px;
      cursor: pointer;
      text-align: left;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }

    .preset-tile strong {
      display: block;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.25;
    }

    .preset-tile span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
    }

    .controls { display: grid; gap: 14px; }

    .control {
      background: white;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }

    .control-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 14px;
      font-weight: 800;
      color: var(--ink);
    }

    .info {
      position: relative;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 17px;
      height: 17px;
      border: 1px solid #cbd5e1;
      border-radius: 50%;
      color: #64748b;
      background: white;
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
      cursor: help;
      flex: 0 0 auto;
    }

    .info::after {
      content: attr(data-tip);
      display: none;
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: 290px;
      padding: 12px;
      border-radius: 16px;
      background: #020617;
      color: white;
      font-size: 12px;
      line-height: 1.45;
      font-weight: 600;
      box-shadow: 0 20px 35px rgba(15, 23, 42, 0.25);
      white-space: normal;
    }

    .info:hover::after, .info:focus::after { display: block; }
    .info.tip-up::after { top: auto; bottom: 24px; }

    .number-box,
    .select-box {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-width: 116px;
      border-radius: 14px;
      background: var(--soft);
      padding: 6px 8px;
      font-size: 14px;
      font-weight: 800;
    }

    .number-box input {
      width: 80px;
      border: 0;
      outline: 0;
      background: transparent;
      text-align: right;
      font-weight: 800;
      color: var(--ink);
    }

    .select-box select {
      width: 150px;
      border: 0;
      outline: 0;
      background: transparent;
      font-weight: 800;
      color: var(--ink);
    }

    .range {
      width: 100%;
      margin-top: 12px;
      accent-color: var(--dark);
    }

    .minmax {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      color: #94a3b8;
      font-size: 11px;
    }

    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: white;
      padding: 16px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }

    .switch {
      width: 48px;
      height: 28px;
      border-radius: 999px;
      background: #cbd5e1;
      position: relative;
      flex: 0 0 auto;
      transition: .18s ease;
    }

    .switch::before {
      content: "";
      position: absolute;
      top: 4px;
      left: 4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: white;
      transition: .18s ease;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.25);
    }

    .switch.on { background: var(--dark); }
    .switch.on::before { transform: translateX(20px); }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      background: white;
      box-shadow: 0 3px 12px rgba(15, 23, 42, 0.04);
    }

    .metric.good { background: var(--good-bg); border-color: var(--good-line); }
    .metric.bad { background: var(--bad-bg); border-color: var(--bad-line); }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .metric-value {
      margin-top: 10px;
      font-size: 24px;
      font-weight: 950;
      letter-spacing: -0.04em;
      color: var(--ink);
    }

    .metric-sub {
      margin-top: 9px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .two-col,
    .three-col {
      display: grid;
      gap: 24px;
      align-items: start;
    }

    .two-col { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .three-col { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .lever-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .lever-content {
      display: grid;
      grid-template-columns: minmax(320px, 0.9fr) minmax(320px, 1.1fr);
      gap: 18px;
      align-items: start;
    }

    svg.chart {
      width: 100%;
      height: auto;
      max-height: 360px;
      display: block;
      background: white;
      border-radius: 18px;
      overflow: visible;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 12px;
      color: #334155;
      font-size: 15px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #0f172a;
      display: inline-block;
    }

    .soft-box {
      background: var(--soft);
      border-radius: 18px;
      padding: 14px;
      font-size: 14px;
      line-height: 1.55;
      color: #475569;
    }

    .soft-box strong { color: var(--ink); }

    .story-box {
      background: var(--blue-bg);
      border: 1px solid var(--blue-line);
      border-radius: 22px;
      padding: 18px;
      line-height: 1.65;
      color: #1e3a8a;
    }

    .story-box strong { color: #0f172a; }

    .mini-stack { display: grid; gap: 12px; margin-top: 14px; }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow-x: auto;
      overflow-y: visible;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      background: var(--soft);
      color: #64748b;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .06em;
      text-align: left;
      padding: 12px 14px;
      white-space: nowrap;
    }

    td {
      padding: 12px 14px;
      border-top: 1px solid #f1f5f9;
      white-space: nowrap;
    }

    .right { text-align: right; }
    .bold { font-weight: 850; }

    .talking-points {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .disclosure-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .comparison-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .comparison-card {
      background: var(--soft);
      border-radius: 18px;
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .comparison-card h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
    }

    .comparison-stat {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid #e2e8f0;
      padding-top: 9px;
      color: #475569;
      font-size: 14px;
    }

    .comparison-stat strong {
      color: var(--ink);
      white-space: nowrap;
    }

    .fit-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .fit-item {
      border-radius: 16px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.45;
      border: 1px solid var(--line);
      background: white;
    }

    .fit-item.good {
      border-color: var(--good-line);
      background: var(--good-bg);
    }

    .fit-item.watch {
      border-color: var(--amber-line);
      background: var(--amber-bg);
      color: var(--amber-ink);
    }

    .fit-item strong {
      display: block;
      color: var(--ink);
      margin-bottom: 3px;
    }

    .disclaimer {
      border: 1px solid var(--amber-line);
      border-radius: 18px;
      background: var(--amber-bg);
      color: var(--amber-ink);
      padding: 14px;
      font-size: 12px;
      line-height: 1.55;
    }

    .hidden { display: none !important; }

    @media (max-width: 1180px) {
      .layout, .hero-grid { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .two-col, .three-col, .lever-grid, .lever-content, .talking-points, .disclosure-grid, .comparison-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .page { padding: 12px; }
      .hero, .card { border-radius: 20px; padding: 18px; }
      .metrics, .preset-grid { grid-template-columns: 1fr; }
      .control-top { flex-direction: column; }
      .number-box, .select-box { width: 100%; justify-content: flex-end; }
      svg.chart { height: 260px; }
      .info::after { width: 230px; left: auto; right: -20px; transform: none; }
      td, th { font-size: 12px; padding: 10px; }
    }

    @media print {
      body { background: white; }
      .page { max-width: none; padding: 0; }
      .hero-actions, aside, .no-print, .preset-card { display: none !important; }
      .layout { display: block; }
      .card, .metric, .hero { box-shadow: none; break-inside: avoid; }
      .hero { border-radius: 0; }
      svg.chart { height: 260px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const DEFAULTS = {
      initialInvestment: 1000000,
      years: 10,
      discountRate: 5.0,
      benchmarkReturn: 7.0,
      directIndexFee: 0.10,
      implementationDrag: 0.00,
      activeTiltAlpha: 0.00,
      trackingError: 1.5,
      volatility: 15.0,
      benchmarkRealizedGains: 2.5,
      includeLossHarvesting: true,
      harvestOpportunity: 3.5,
      harvestCalibration: "balanced",
      lossUtilization: 90,
      shortTermLossShare: 65,
      includeGainDeferral: true,
      gainDeferral: 75,
      gainBudgetEnabled: false,
      gainBudgetPct: 1.0,
      ltTaxRate: 23.8,
      stTaxRate: 40.8,
      annualContribution: 0,
      annualWithdrawal: 0,
      startingEmbeddedGainPct: 0,
      reinvestTaxSavings: true,
      terminalLiquidation: true
    };

    const PRESETS = [
      {
        id: "balanced",
        name: "Balanced default",
        desc: "Base case for a taxable equity allocation.",
        reset: true,
        values: {}
      },
      {
        id: "highTax",
        name: "High-tax client",
        desc: "Higher tax rates and better loss utilization.",
        values: { ltTaxRate: 33, stTaxRate: 50, lossUtilization: 100, shortTermLossShare: 80, discountRate: 5 }
      },
      {
        id: "volatile",
        name: "Volatile market",
        desc: "Wider outcomes and more harvesting opportunity.",
        values: { volatility: 25, trackingError: 2.5, harvestOpportunity: 4.5, harvestCalibration: "balanced" }
      },
      {
        id: "lowVol",
        name: "Low-vol market",
        desc: "Lower harvesting opportunity and tighter bands.",
        values: { volatility: 8, trackingError: 1, harvestOpportunity: 2.5, harvestCalibration: "conservative" }
      },
      {
        id: "noLiquidation",
        name: "Continued deferral",
        desc: "No assumed sale at the horizon.",
        values: { terminalLiquidation: false, years: 15 }
      },
      {
        id: "embeddedGain",
        name: "Large embedded gain",
        desc: "Transition-aware case with legacy appreciation.",
        values: { startingEmbeddedGainPct: 35, gainBudgetEnabled: true, gainBudgetPct: 0.75, benchmarkRealizedGains: 1.5 }
      },
      {
        id: "taxBudget",
        name: "Tax-budgeted transition",
        desc: "Limits annual realized gains in the direct index.",
        values: { gainBudgetEnabled: true, gainBudgetPct: 0.5, gainDeferral: 85, benchmarkRealizedGains: 3 }
      }
    ];

    let params = { ...DEFAULTS };
    let viewMode = "simple";
    let shareMessage = "";

    const money = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      maximumFractionDigits: 0
    });

    function dollars(value) {
      return money.format(Number.isFinite(value) ? value : 0);
    }

    function compactDollars(value) {
      const safe = Number.isFinite(value) ? value : 0;
      const abs = Math.abs(safe);
      if (abs >= 1000000) return "$" + (safe / 1000000).toFixed(abs < 10000000 ? 1 : 0) + "M";
      if (abs >= 1000) return "$" + Math.round(safe / 1000) + "k";
      return dollars(safe);
    }

    function pct(value, digits = 2) {
      return ((Number.isFinite(value) ? value : 0) * 100).toFixed(digits) + "%";
    }

    function cagr(endValue, startValue, years) {
      if (endValue <= 0 || startValue <= 0 || years <= 0) return 0;
      return Math.pow(endValue / startValue, 1 / years) - 1;
    }

    function escapeAttr(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("\"", "&quot;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function info(text, direction = "down") {
      if (!text) return "";
      const directionClass = direction === "up" ? " tip-up" : "";
      return `<span class="info${directionClass}" tabindex="0" data-tip="${escapeAttr(text)}">i</span>`;
    }

    function label(text, tip) {
      return `<span class="label"><span>${text}</span>${info(tip)}</span>`;
    }

    function harvestCalibrationMultiplier(value) {
      if (value === "conservative") return 0.7;
      if (value === "optimistic") return 1.25;
      return 1;
    }

    function taxAlphaBandMultipliers(volatility) {
      const spread = Math.min(0.75, Math.max(0.15, 0.12 + volatility / 100));
      return { spread, low: Math.max(0, 1 - spread), high: 1 + spread };
    }

    function getEffectiveHarvestOpportunity(p, includeLossHarvesting, harvestOpportunityMultiplier = 1) {
      if (!includeLossHarvesting) return 0;
      const baseHarvest = Math.max(0, p.harvestOpportunity) / 100;
      const normalizedVolatility = Math.max(0.01, p.volatility / 15);
      const volatilityMultiplier = Math.pow(normalizedVolatility, 1.15);
      const calibration = harvestCalibrationMultiplier(p.harvestCalibration);
      return Math.min(0.25, baseHarvest * volatilityMultiplier * calibration * harvestOpportunityMultiplier);
    }

    function applyContribution(value, basis, contribution) {
      const amount = Math.max(0, contribution);
      return { value: value + amount, basis: basis + amount };
    }

    function applyWithdrawal(value, basis, withdrawal, ltTaxRate) {
      const amount = Math.min(Math.max(0, withdrawal), Math.max(0, value));
      if (amount <= 0 || value <= 0) return { value, basis, tax: 0 };
      const gainRatio = Math.max(0, value - basis) / value;
      const basisRatio = Math.min(1, Math.max(0, basis / value));
      const realizedGain = amount * gainRatio;
      const tax = realizedGain * ltTaxRate;
      return {
        value: Math.max(0, value - amount - tax),
        basis: Math.max(0, basis - amount * basisRatio),
        tax
      };
    }

    function simulate(p, overrides = {}) {
      const includeLossHarvesting = overrides.includeLossHarvesting ?? p.includeLossHarvesting;
      const includeGainDeferral = overrides.includeGainDeferral ?? p.includeGainDeferral;
      const harvestOpportunityMultiplier = overrides.harvestOpportunityMultiplier ?? 1;
      const trackingBandSign = overrides.trackingBandSign ?? 0;
      const terminalLiquidation = overrides.terminalLiquidation ?? p.terminalLiquidation;

      const initial = Math.max(1, p.initialInvestment);
      const years = Math.max(1, Math.round(p.years));
      const benchmarkReturn = p.benchmarkReturn / 100;
      const feeDrag = Math.max(0, p.directIndexFee || 0);
      const implementationDrag = Math.max(0, p.implementationDrag || 0);
      const activeTiltAlpha = p.activeTiltAlpha || 0;
      const expectedPretaxDiff = activeTiltAlpha - feeDrag - implementationDrag;
      const baseDirectIndexReturn = (p.benchmarkReturn + expectedPretaxDiff) / 100;
      const trackingError = Math.max(0, p.trackingError) / 100;
      const ltTaxRate = p.ltTaxRate / 100;
      const stTaxRate = p.stTaxRate / 100;
      const discountRate = Math.max(0, p.discountRate) / 100;
      const realizedGainPct = p.benchmarkRealizedGains / 100;
      const gainDeferralRate = includeGainDeferral ? p.gainDeferral / 100 : 0;
      const effectiveHarvestOpportunity = getEffectiveHarvestOpportunity(p, includeLossHarvesting, harvestOpportunityMultiplier);
      const lossUtilization = p.lossUtilization / 100;
      const shortTermShare = p.shortTermLossShare / 100;
      const harvestBenefitRate = shortTermShare * stTaxRate + (1 - shortTermShare) * ltTaxRate;
      const annualContribution = Math.max(0, p.annualContribution || 0);
      const annualWithdrawal = Math.max(0, p.annualWithdrawal || 0);
      const startingEmbeddedGainPct = Math.max(-50, Math.min(90, p.startingEmbeddedGainPct || 0)) / 100;
      const initialBasis = Math.max(0, initial * (1 - startingEmbeddedGainPct));

      let benchmarkPretax = initial;
      let directPretax = initial;
      let benchmarkValue = initial;
      let benchmarkBasis = initialBasis;
      let directValue = initial;
      let directBasis = initialBasis;
      let outsideTaxSavings = 0;
      let totalBenchmarkAnnualTax = 0;
      let totalDirectAnnualTax = 0;
      let pvBenchmarkAnnualTaxes = 0;
      let pvDirectAnnualTaxes = 0;
      let pvHarvestTaxSavings = 0;
      let totalHarvestedLosses = 0;
      let totalHarvestTaxSavings = 0;
      let cumulativeBenchmarkTax = 0;
      let cumulativeDirectNetTax = 0;

      const rows = [{
        year: 0,
        benchmarkPretax: initial,
        directPretax: initial,
        directPretaxLow: initial,
        directPretaxHigh: initial,
        benchmarkAfterTax: initial,
        directAfterTax: initial,
        benchmarkCumulativeTax: 0,
        directCumulativeTax: 0,
        benchmarkCumulativeTaxWithLiquidation: 0,
        directCumulativeTaxWithLiquidation: 0
      }];

      for (let year = 1; year <= years; year++) {
        let bContrib = applyContribution(benchmarkValue, benchmarkBasis, annualContribution);
        benchmarkValue = bContrib.value;
        benchmarkBasis = bContrib.basis;

        let dContrib = applyContribution(directValue, directBasis, annualContribution);
        directValue = dContrib.value;
        directBasis = dContrib.basis;

        benchmarkPretax += annualContribution;
        directPretax += annualContribution;

        const activeTrackingShock = trackingBandSign * trackingError * (Math.sqrt(year) - Math.sqrt(year - 1));
        const directIndexReturn = (1 + baseDirectIndexReturn) * Math.exp(activeTrackingShock) - 1;

        benchmarkPretax *= 1 + benchmarkReturn;
        directPretax *= 1 + directIndexReturn;

        const benchmarkGross = benchmarkValue * (1 + benchmarkReturn);
        const benchmarkAppreciation = Math.max(0, benchmarkGross - benchmarkBasis);
        const benchmarkRealizedGain = Math.min(benchmarkAppreciation, benchmarkGross * realizedGainPct);
        let benchmarkAnnualTax = benchmarkRealizedGain * ltTaxRate;
        benchmarkBasis += benchmarkRealizedGain;
        benchmarkValue = benchmarkGross - benchmarkAnnualTax;

        const directGross = directValue * (1 + directIndexReturn);
        const directAppreciation = Math.max(0, directGross - directBasis);
        let directRealizedGain = Math.min(directAppreciation, directGross * realizedGainPct * (1 - gainDeferralRate));
        if (p.gainBudgetEnabled) {
          directRealizedGain = Math.min(directRealizedGain, directGross * Math.max(0, p.gainBudgetPct) / 100);
        }
        let directAnnualTax = directRealizedGain * ltTaxRate;

        const harvestedLoss = directGross * effectiveHarvestOpportunity * lossUtilization;
        const harvestTaxSavings = harvestedLoss * harvestBenefitRate;

        let nextDirectBasis = directBasis + directRealizedGain - harvestedLoss;
        let nextDirectValue = directGross - directAnnualTax;

        if (includeLossHarvesting) {
          if (p.reinvestTaxSavings) {
            nextDirectValue += harvestTaxSavings;
            nextDirectBasis += harvestTaxSavings;
          } else {
            outsideTaxSavings += harvestTaxSavings;
          }
        }

        directBasis = Math.max(0, nextDirectBasis);
        directValue = nextDirectValue;

        const bWithdraw = applyWithdrawal(benchmarkValue, benchmarkBasis, annualWithdrawal, ltTaxRate);
        benchmarkValue = bWithdraw.value;
        benchmarkBasis = bWithdraw.basis;
        benchmarkAnnualTax += bWithdraw.tax;

        const dWithdraw = applyWithdrawal(directValue, directBasis, annualWithdrawal, ltTaxRate);
        directValue = dWithdraw.value;
        directBasis = dWithdraw.basis;
        directAnnualTax += dWithdraw.tax;

        benchmarkPretax = Math.max(0, benchmarkPretax - annualWithdrawal);
        directPretax = Math.max(0, directPretax - annualWithdrawal);

        totalBenchmarkAnnualTax += benchmarkAnnualTax;
        totalDirectAnnualTax += directAnnualTax;
        const discountFactor = Math.pow(1 + discountRate, year);
        pvBenchmarkAnnualTaxes += benchmarkAnnualTax / discountFactor;
        pvDirectAnnualTaxes += directAnnualTax / discountFactor;
        pvHarvestTaxSavings += harvestTaxSavings / discountFactor;
        totalHarvestedLosses += harvestedLoss;
        totalHarvestTaxSavings += harvestTaxSavings;
        cumulativeBenchmarkTax += benchmarkAnnualTax;
        cumulativeDirectNetTax += directAnnualTax - harvestTaxSavings;

        const benchmarkTerminalTaxNow = terminalLiquidation ? Math.max(0, benchmarkValue - benchmarkBasis) * ltTaxRate : 0;
        const directTerminalTaxNow = terminalLiquidation ? Math.max(0, directValue - directBasis) * ltTaxRate : 0;
        const trackingBandFactor = Math.exp(trackingError * Math.sqrt(year));

        rows.push({
          year,
          benchmarkPretax,
          directPretax,
          directPretaxLow: directPretax / trackingBandFactor,
          directPretaxHigh: directPretax * trackingBandFactor,
          benchmarkAfterTax: benchmarkValue - benchmarkTerminalTaxNow,
          directAfterTax: directValue - directTerminalTaxNow + outsideTaxSavings,
          benchmarkCumulativeTax: cumulativeBenchmarkTax,
          directCumulativeTax: cumulativeDirectNetTax,
          benchmarkCumulativeTaxWithLiquidation: cumulativeBenchmarkTax + benchmarkTerminalTaxNow,
          directCumulativeTaxWithLiquidation: cumulativeDirectNetTax + directTerminalTaxNow
        });
      }

      const terminalBenchmarkTax = terminalLiquidation ? Math.max(0, benchmarkValue - benchmarkBasis) * ltTaxRate : 0;
      const terminalDirectTax = terminalLiquidation ? Math.max(0, directValue - directBasis) * ltTaxRate : 0;
      const terminalDiscountFactor = Math.pow(1 + discountRate, years);
      const pvBenchmarkTerminalTax = terminalBenchmarkTax / terminalDiscountFactor;
      const pvDirectTerminalTax = terminalDirectTax / terminalDiscountFactor;
      const pvBenchmarkTotalTaxes = pvBenchmarkAnnualTaxes + pvBenchmarkTerminalTax;
      const pvDirectTotalTaxes = pvDirectAnnualTaxes - pvHarvestTaxSavings + pvDirectTerminalTax;
      const pvTaxAdvantage = pvBenchmarkTotalTaxes - pvDirectTotalTaxes;
      const benchmarkAfterTaxEnd = benchmarkValue - terminalBenchmarkTax;
      const directAfterTaxEnd = directValue - terminalDirectTax + outsideTaxSavings;
      const benchmarkPretaxCagr = cagr(benchmarkPretax, initial, years);
      const directPretaxCagr = cagr(directPretax, initial, years);
      const benchmarkAfterTaxCagr = cagr(benchmarkAfterTaxEnd, initial, years);
      const directAfterTaxCagr = cagr(directAfterTaxEnd, initial, years);
      const pretaxActiveReturn = directPretaxCagr - benchmarkPretaxCagr;
      const afterTaxActiveReturn = directAfterTaxCagr - benchmarkAfterTaxCagr;
      const taxAlpha = afterTaxActiveReturn - pretaxActiveReturn;
      const terminalRow = rows[rows.length - 1];

      return {
        rows,
        initial,
        years,
        benchmarkPretax,
        directPretax,
        directPretaxLow: terminalRow.directPretaxLow,
        directPretaxHigh: terminalRow.directPretaxHigh,
        benchmarkAfterTaxEnd,
        directAfterTaxEnd,
        benchmarkPretaxCagr,
        directPretaxCagr,
        benchmarkAfterTaxCagr,
        directAfterTaxCagr,
        benchmarkTaxDrag: benchmarkAfterTaxCagr - benchmarkPretaxCagr,
        directTaxDrag: directAfterTaxCagr - directPretaxCagr,
        pretaxActiveReturn,
        afterTaxActiveReturn,
        taxAlpha,
        terminalBenchmarkTax,
        terminalDirectTax,
        totalBenchmarkAnnualTax,
        totalDirectAnnualTax,
        pvBenchmarkTotalTaxes,
        pvDirectTotalTaxes,
        pvTaxAdvantage,
        pvHarvestTaxSavings,
        pvBenchmarkTerminalTax,
        pvDirectTerminalTax,
        totalHarvestedLosses,
        totalHarvestTaxSavings,
        harvestBenefitRate,
        effectiveHarvestOpportunity
      };
    }

    function slider(key, labelText, min, max, step, suffix, prefix, tip) {
      const value = params[key];
      return `
        <div class="control">
          <div class="control-top">
            <div>${label(labelText, tip)}</div>
            <div class="number-box">
              <span>${prefix || ""}</span>
              <input type="number" data-key="${key}" min="${min}" max="${max}" step="${step}" value="${value}">
              <span>${suffix || ""}</span>
            </div>
          </div>
          <input class="range" type="range" data-key="${key}" min="${min}" max="${max}" step="${step}" value="${value}">
          <div class="minmax"><span>${prefix || ""}${min}${suffix || ""}</span><span>${prefix || ""}${max}${suffix || ""}</span></div>
        </div>
      `;
    }

    function selectControl(key, labelText, options, tip) {
      return `
        <div class="control">
          <div class="control-top">
            <div>${label(labelText, tip)}</div>
            <div class="select-box">
              <select data-select="${key}">
                ${options.map(option => `<option value="${option.value}" ${params[key] === option.value ? "selected" : ""}>${option.label}</option>`).join("")}
              </select>
            </div>
          </div>
        </div>
      `;
    }

    function toggle(key, labelText, tip) {
      return `
        <button class="toggle" type="button" data-toggle="${key}">
          ${label(labelText, tip)}
          <span class="switch ${params[key] ? "on" : ""}"></span>
        </button>
      `;
    }

    function metric(labelText, value, sub, tone, tip) {
      const toneClass = tone === undefined ? "" : tone ? "good" : "bad";
      return `
        <div class="metric ${toneClass}">
          <div class="metric-label">${label(labelText, tip)}</div>
          <div class="metric-value">${value}</div>
          <div class="metric-sub">${sub || ""}</div>
        </div>
      `;
    }

    function sectionHeader(title, subtitle, tip) {
      return `
        <div class="section-head">
          <div>
            <h2 class="section-title">${label(title, tip)}</h2>
            ${subtitle ? `<p class="section-subtitle">${subtitle}</p>` : ""}
          </div>
        </div>
      `;
    }

    function chartScales(rows, keys, width, height, pad, includeZero = false) {
      const values = [];
      rows.forEach(row => keys.forEach(k => values.push(row[k])));
      const safeValues = includeZero ? [...values, 0] : values;
      const rawMin = Math.min(...safeValues);
      const rawMax = Math.max(...safeValues);
      const span = Math.max(1, rawMax - rawMin);
      let min = rawMin - span * 0.08;
      let max = rawMax + span * 0.08;
      if (!includeZero && rawMin > 0) min = Math.max(0, min);
      const years = Math.max(1, rows[rows.length - 1].year);
      const xScale = year => pad + year * ((width - pad * 2) / years);
      const yScale = v => pad + (max - v) * ((height - pad * 2) / Math.max(1, max - min));
      return { min, max, years, xScale, yScale };
    }

    function pointsFor(rows, key, xScale, yScale) {
      return rows.map(d => `${xScale(d.year)},${yScale(d[key])}`).join(" ");
    }

    function gridLines(min, max, width, height, pad) {
      let out = "";
      [0, .25, .5, .75, 1].forEach(t => {
        const y = pad + t * (height - pad * 2);
        const value = max - t * (max - min);
        out += `<line x1="${pad}" x2="${width - pad}" y1="${y}" y2="${y}" stroke="#e2e8f0"></line>`;
        out += `<text x="10" y="${y + 5}" font-size="13" fill="#64748b">${compactDollars(value)}</text>`;
      });
      return out;
    }

    function trackingBandChart(rows) {
      const width = 760, height = 330, pad = 48;
      const s = chartScales(rows, ["benchmarkPretax", "directPretax", "directPretaxLow", "directPretaxHigh"], width, height, pad);
      const high = pointsFor(rows, "directPretaxHigh", s.xScale, s.yScale);
      const low = pointsFor([...rows].reverse(), "directPretaxLow", s.xScale, s.yScale);
      const final = rows[rows.length - 1];
      return `
        <svg class="chart" viewBox="0 0 ${width} ${height}">
          ${gridLines(s.min, s.max, width, height, pad)}
          ${[0, Math.round(s.years / 2), s.years].map(year => `<text x="${s.xScale(year) - 10}" y="${height - 14}" font-size="13" fill="#64748b">Y${year}</text>`).join("")}
          <polygon points="${high} ${low}" fill="#cbd5e1" opacity="0.55"></polygon>
          <polyline points="${pointsFor(rows, "benchmarkPretax", s.xScale, s.yScale)}" fill="none" stroke="#64748b" stroke-width="4" stroke-dasharray="8 7" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <polyline points="${pointsFor(rows, "directPretax", s.xScale, s.yScale)}" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <circle cx="${s.xScale(s.years)}" cy="${s.yScale(final.directPretax)}" r="5" fill="#0f172a"></circle>
          <circle cx="${s.xScale(s.years)}" cy="${s.yScale(final.benchmarkPretax)}" r="5" fill="#64748b"></circle>
        </svg>
        <div class="legend">
          <span class="legend-item"><span class="dot" style="background:#cbd5e1"></span> Direct index 1σ tracking band</span>
          <span class="legend-item"><span class="dot" style="background:#0f172a"></span> Direct index expected pre-tax</span>
          <span class="legend-item"><span class="dot" style="background:#64748b"></span> Benchmark pre-tax</span>
        </div>
      `;
    }

    function wealthChart(rows, lowRows, highRows) {
      const width = 760, height = 330, pad = 48;
      const allRows = [...rows, ...lowRows, ...highRows];
      const s = chartScales(allRows, ["benchmarkAfterTax", "directAfterTax"], width, height, pad);
      const years = rows[rows.length - 1].year;
      const high = pointsFor(highRows, "directAfterTax", s.xScale, s.yScale);
      const low = pointsFor([...lowRows].reverse(), "directAfterTax", s.xScale, s.yScale);
      const final = rows[rows.length - 1];
      return `
        <svg class="chart" viewBox="0 0 ${width} ${height}">
          ${gridLines(s.min, s.max, width, height, pad)}
          ${[0, Math.round(years / 2), years].map(year => `<text x="${s.xScale(year) - 10}" y="${height - 14}" font-size="13" fill="#64748b">Y${year}</text>`).join("")}
          <polygon points="${high} ${low}" fill="#bbf7d0" opacity="0.55"></polygon>
          <polyline points="${pointsFor(rows, "benchmarkAfterTax", s.xScale, s.yScale)}" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <polyline points="${pointsFor(rows, "directAfterTax", s.xScale, s.yScale)}" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <circle cx="${s.xScale(years)}" cy="${s.yScale(final.benchmarkAfterTax)}" r="5" fill="#64748b"></circle>
          <circle cx="${s.xScale(years)}" cy="${s.yScale(final.directAfterTax)}" r="5" fill="#0f172a"></circle>
        </svg>
        <div class="legend">
          <span class="legend-item"><span class="dot" style="background:#bbf7d0"></span> Combined lower/higher outcome band</span>
          <span class="legend-item"><span class="dot" style="background:#64748b"></span> Benchmark after-tax</span>
          <span class="legend-item"><span class="dot" style="background:#0f172a"></span> Expected direct index after-tax</span>
        </div>
      `;
    }

    function taxPaidChart(rows) {
      const width = 760, height = 330, pad = 48;
      const s = chartScales(rows, ["benchmarkCumulativeTaxWithLiquidation", "directCumulativeTaxWithLiquidation"], width, height, pad, true);
      return `
        <svg class="chart" viewBox="0 0 ${width} ${height}">
          ${gridLines(s.min, s.max, width, height, pad)}
          ${[0, Math.round(s.years / 2), s.years].map(year => `<text x="${s.xScale(year) - 10}" y="${height - 14}" font-size="13" fill="#64748b">Y${year}</text>`).join("")}
          <polyline points="${pointsFor(rows, "benchmarkCumulativeTaxWithLiquidation", s.xScale, s.yScale)}" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <polyline points="${pointsFor(rows, "directCumulativeTaxWithLiquidation", s.xScale, s.yScale)}" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></polyline>
        </svg>
        <div class="legend">
          <span class="legend-item"><span class="dot" style="background:#64748b"></span> Benchmark cumulative tax burden</span>
          <span class="legend-item"><span class="dot" style="background:#0f172a"></span> Direct index cumulative tax burden</span>
        </div>
      `;
    }

    function returnBridgeChart(preTaxDiff, taxAlpha, postTaxDiff) {
      const width = 760, height = 300, leftPad = 162, rightPad = 42, topPad = 48, rowGap = 78, axisY = 252;
      const values = [0, preTaxDiff, preTaxDiff + taxAlpha, postTaxDiff];
      const rawMin = Math.min(...values);
      const rawMax = Math.max(...values);
      const span = Math.max(0.0025, rawMax - rawMin);
      const min = rawMin - span * .35;
      const max = rawMax + span * .35;
      const xScale = v => leftPad + ((v - min) / Math.max(.0001, max - min)) * (width - leftPad - rightPad);
      const zeroX = xScale(0);
      const rows = [
        { label: "1. Pre-tax relative return", from: 0, to: preTaxDiff, value: preTaxDiff, note: "Direct index before tax versus benchmark." },
        { label: "2. Tax alpha", from: preTaxDiff, to: preTaxDiff + taxAlpha, value: taxAlpha, note: "Tax management after removing pre-tax difference." },
        { label: "3. Post-tax relative return", from: 0, to: postTaxDiff, value: postTaxDiff, note: "Direct index after tax versus benchmark." }
      ];
      let body = `<line x1="${zeroX}" x2="${zeroX}" y1="24" y2="${axisY}" stroke="#94a3b8" stroke-dasharray="5 6"></line><text x="${zeroX + 5}" y="26" font-size="11" fill="#64748b">0%</text>`;
      rows.forEach((row, i) => {
        const y = topPad + i * rowGap;
        const x1 = xScale(row.from);
        const x2 = xScale(row.to);
        const barX = Math.min(x1, x2);
        const barW = Math.max(3, Math.abs(x2 - x1));
        const isPositive = row.value >= 0;
        const fill = i === 1 ? (isPositive ? "#059669" : "#dc2626") : "#0f172a";
        body += `<text x="14" y="${y + 6}" font-size="13" font-weight="800" fill="#0f172a">${row.label}</text>`;
        body += `<text x="14" y="${y + 25}" font-size="11" fill="#64748b">${row.note}</text>`;
        body += `<rect x="${barX}" y="${y - 12}" width="${barW}" height="28" rx="9" fill="${fill}" opacity="${i === 1 ? .9 : 1}"></rect>`;
        body += `<text x="${x2 + (isPositive ? 8 : -8)}" y="${y + 7}" text-anchor="${isPositive ? "start" : "end"}" font-size="13" font-weight="800" fill="#0f172a">${pct(row.value)}</text>`;
        if (i < 2) body += `<line x1="${x2}" x2="${x2}" y1="${y + 22}" y2="${y + rowGap - 26}" stroke="#cbd5e1" stroke-dasharray="4 5"></line>`;
      });
      [min, 0, max].forEach(value => {
        body += `<line x1="${xScale(value)}" x2="${xScale(value)}" y1="${axisY - 4}" y2="${axisY + 4}" stroke="#94a3b8"></line>`;
        body += `<text x="${xScale(value)}" y="${axisY + 22}" text-anchor="middle" font-size="11" fill="#64748b">${pct(value, 1)}</text>`;
      });
      return `
        <svg class="chart" viewBox="0 0 ${width} ${height}">${body}</svg>
        <div class="soft-box"><strong>Visual formula:</strong> pre-tax relative return difference ${pct(preTaxDiff)} + tax alpha ${pct(taxAlpha)} = post-tax relative return difference ${pct(postTaxDiff)}.</div>
      `;
    }

    function horizontalBars(items, formatter, scaleToZero = true) {
      const width = 760;
      const height = 72 + items.length * 66;
      const leftPad = 270;
      const rightPad = 150;
      const values = items.map(d => d.value);
      let min = scaleToZero ? Math.min(0, ...values) : Math.min(...values);
      let max = scaleToZero ? Math.max(0, ...values) : Math.max(...values);
      if (Math.abs(max - min) < 0.0001) max = min + 1;
      const span = Math.max(0.0001, max - min);
      const xScale = v => leftPad + ((v - min) / span) * (width - leftPad - rightPad);
      const zeroX = xScale(0);
      let body = `<line x1="${zeroX}" x2="${zeroX}" y1="24" y2="${height - 30}" stroke="#94a3b8" stroke-dasharray="5 6"></line>`;
      items.forEach((d, i) => {
        const y = 54 + i * 66;
        const x1 = xScale(0);
        const x2 = xScale(d.value);
        const barX = Math.min(x1, x2);
        const barW = Math.max(3, Math.abs(x2 - x1));
        const fill = d.value >= 0 ? (d.color || "#0f172a") : "#dc2626";
        body += `<text x="14" y="${y + 6}" font-size="15" font-weight="850" fill="#0f172a">${d.label}</text>`;
        body += `<rect x="${barX}" y="${y - 15}" width="${barW}" height="30" rx="9" fill="${fill}"></rect>`;
        body += `<text x="${width - 14}" y="${y + 7}" text-anchor="end" font-size="15" font-weight="850" fill="#0f172a">${formatter(d.value)}</text>`;
      });
      return `<svg class="chart" viewBox="0 0 ${width} ${height}">${body}</svg>`;
    }

    function barBreakdown(lossValue, deferralValue) {
      return horizontalBars([
        { label: "Loss harvesting", value: lossValue },
        { label: "Gain deferral", value: deferralValue }
      ], dollars);
    }

    function taxDragChart(result) {
      return horizontalBars([
        { label: "Benchmark tax drag", value: result.benchmarkTaxDrag, color: "#64748b" },
        { label: "Direct index tax drag", value: result.directTaxDrag, color: "#0f172a" }
      ], v => pct(v));
    }

    function benefitWaterfall(result, endingPretaxGap, taxAlphaDollars) {
      return horizontalBars([
        { label: "Benchmark after-tax", value: result.benchmarkAfterTaxEnd, color: "#64748b" },
        { label: "Expected pre-tax diff", value: endingPretaxGap, color: endingPretaxGap >= 0 ? "#0f172a" : "#dc2626" },
        { label: "Tax-management value", value: taxAlphaDollars, color: taxAlphaDollars >= 0 ? "#059669" : "#dc2626" },
        { label: "Direct index after-tax", value: result.directAfterTaxEnd, color: "#0f172a" }
      ], dollars);
    }

    function feeAlphaBridgeChart(p, result) {
      const fee = -Math.max(0, p.directIndexFee || 0) / 100;
      const implementation = -Math.max(0, p.implementationDrag || 0) / 100;
      const activeTilt = (p.activeTiltAlpha || 0) / 100;
      return horizontalBars([
        { label: "Direct indexing fee", value: fee, color: "#dc2626" },
        { label: "Implementation drag", value: implementation, color: "#dc2626" },
        { label: "Active tilt alpha/drag", value: activeTilt, color: activeTilt >= 0 ? "#0f172a" : "#dc2626" },
        { label: "Tax alpha", value: result.taxAlpha, color: result.taxAlpha >= 0 ? "#059669" : "#dc2626" },
        { label: "Net post-tax relative return", value: result.afterTaxActiveReturn, color: result.afterTaxActiveReturn >= 0 ? "#0f172a" : "#dc2626" }
      ], v => pct(v));
    }

    function lossTimingChart(result) {
      const pvFutureRecapture = Math.max(0, result.pvDirectTerminalTax - result.pvBenchmarkTerminalTax);
      const pvNetAfterRecapture = result.pvHarvestTaxSavings - pvFutureRecapture;
      return horizontalBars([
        { label: "PV harvested-loss savings", value: result.pvHarvestTaxSavings, color: "#059669" },
        { label: "PV future tax recapture", value: -pvFutureRecapture, color: "#dc2626" },
        { label: "PV net after recapture", value: pvNetAfterRecapture, color: pvNetAfterRecapture >= 0 ? "#0f172a" : "#dc2626" }
      ], dollars);
    }

    function fitChecklist(p, result) {
      const items = [];
      const add = (good, title, text) => items.push({ good, title, text });
      add(p.ltTaxRate >= 25 || p.stTaxRate >= 40, "Tax rate", p.ltTaxRate >= 25 || p.stTaxRate >= 40 ? "Higher tax rates make harvesting and deferral more valuable." : "Lower tax rates reduce the value of tax management.");
      add(p.volatility >= 14, "Volatility", p.volatility >= 14 ? "More volatility generally creates more harvestable losses." : "Low volatility can limit harvesting opportunity.");
      add(p.lossUtilization >= 75, "Loss utilization", p.lossUtilization >= 75 ? "The client is assumed able to use most harvested losses." : "Limited loss utilization can reduce realized value.");
      add(p.years >= 7, "Time horizon", p.years >= 7 ? "Longer horizons give deferral more time to compound." : "Short horizons reduce the compounding power of deferral.");
      add(!p.terminalLiquidation, "Exit plan", !p.terminalLiquidation ? "Continued deferral can preserve more tax value." : "Full liquidation can recapture part of the tax benefit.");
      add(Math.abs(result.taxAlpha) > 0.001, "Modeled tax alpha", result.taxAlpha > 0 ? "The scenario shows positive tax alpha after assumptions." : "Tax alpha is low or negative under this setup.");
      if ((p.startingEmbeddedGainPct || 0) > 25) add(false, "Embedded gain", "Large legacy gains require transition and tax-budget planning.");
      return `<div class="fit-grid">${items.map(item => `<div class="fit-item ${item.good ? "good" : "watch"}"><strong>${item.good ? "Favorable:" : "Watch:"} ${item.title}</strong>${item.text}</div>`).join("")}</div>`;
    }

    function buildStory(p, result, endingAfterTaxGap, taxAlphaDollars, lossValue, deferralValue) {
      const direction = result.pretaxActiveReturn >= 0 ? "ahead of" : "behind";
      const afterDirection = result.afterTaxActiveReturn >= 0 ? "ahead of" : "behind";
      const mainEngine = Math.abs(lossValue) >= Math.abs(deferralValue) ? "loss harvesting" : "gain deferral";
      const feeHurdle = Math.max(0, ((p.directIndexFee || 0) + (p.implementationDrag || 0) - (p.activeTiltAlpha || 0)) / 100);
      return `
        <div class="story-box">
          <strong>Client story:</strong> In this scenario, the direct index is ${direction} the benchmark by <strong>${pct(Math.abs(result.pretaxActiveReturn))}</strong> per year before tax.
          The explicit fee/drag hurdle is <strong>${pct(feeHurdle)}</strong>, while modeled tax alpha is <strong>${pct(result.taxAlpha)}</strong>.
          Tax management adds about <strong>${dollars(taxAlphaDollars)}</strong> of modeled value after removing the expected pre-tax return difference.
          The client ends up ${afterDirection} the benchmark by <strong>${pct(Math.abs(result.afterTaxActiveReturn))}</strong> per year after tax, equal to about <strong>${dollars(endingAfterTaxGap)}</strong> over the horizon.
          In this case, the larger tax lever is <strong>${mainEngine}</strong>.
        </div>
      `;
    }

    function comparisonCards(withLiquidation, withoutLiquidation) {
      const diffWith = withLiquidation.directAfterTaxEnd - withLiquidation.benchmarkAfterTaxEnd;
      const diffWithout = withoutLiquidation.directAfterTaxEnd - withoutLiquidation.benchmarkAfterTaxEnd;
      return `
        <div class="comparison-grid">
          <div class="comparison-card">
            <h3>Sold at horizon ${info("Assumes the full portfolio is liquidated at the end of the period and embedded gains are taxed.")}</h3>
            <div class="comparison-stat"><span>After-tax advantage</span><strong>${dollars(diffWith)}</strong></div>
            <div class="comparison-stat"><span>Tax alpha</span><strong>${pct(withLiquidation.taxAlpha)}</strong></div>
            <div class="comparison-stat"><span>Direct ending value</span><strong>${dollars(withLiquidation.directAfterTaxEnd)}</strong></div>
          </div>
          <div class="comparison-card">
            <h3>Continued deferral ${info("Assumes the portfolio is not sold at the end of the period. This can be relevant for ongoing holding, gradual transition, charitable giving, or estate planning.")}</h3>
            <div class="comparison-stat"><span>After-tax advantage</span><strong>${dollars(diffWithout)}</strong></div>
            <div class="comparison-stat"><span>Tax alpha</span><strong>${pct(withoutLiquidation.taxAlpha)}</strong></div>
            <div class="comparison-stat"><span>Direct ending value</span><strong>${dollars(withoutLiquidation.directAfterTaxEnd)}</strong></div>
          </div>
        </div>
      `;
    }

    function encodeScenario() {
      const payload = { params, viewMode };
      return btoa(encodeURIComponent(JSON.stringify(payload)));
    }

    function loadScenarioFromHash() {
      if (!location.hash || location.hash.length < 2) return;
      try {
        const parsed = JSON.parse(decodeURIComponent(atob(location.hash.slice(1))));
        params = { ...DEFAULTS, ...(parsed.params || {}) };
        viewMode = parsed.viewMode || "simple";
      } catch (e) {
        // Ignore invalid hashes.
      }
    }

    function copyScenarioLink() {
      const url = location.origin + location.pathname + "#" + encodeScenario();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(() => {
          shareMessage = "Scenario link copied.";
          render();
        }).catch(() => {
          window.prompt("Copy this scenario link:", url);
        });
      } else {
        window.prompt("Copy this scenario link:", url);
      }
    }

    function render() {
      const result = simulate(params);
      const multipliers = taxAlphaBandMultipliers(params.volatility);
      const scenarios = [
        simulate(params, { trackingBandSign: -1, harvestOpportunityMultiplier: multipliers.low }),
        simulate(params, { trackingBandSign: -1, harvestOpportunityMultiplier: multipliers.high }),
        simulate(params, { trackingBandSign: 1, harvestOpportunityMultiplier: multipliers.low }),
        simulate(params, { trackingBandSign: 1, harvestOpportunityMultiplier: multipliers.high })

      const lowResult = scenarios.reduce((best, item) => item.directAfterTaxEnd < best.directAfterTaxEnd ? item : best, scenarios[0]);
      const highResult = scenarios.reduce((best, item) => item.directAfterTaxEnd > best.directAfterTaxEnd ? item : best, scenarios[0]);
      const lowTaxAlpha = Math.min(...scenarios.map(x => x.taxAlpha));
      const highTaxAlpha = Math.max(...scenarios.map(x => x.taxAlpha));

      const withBoth = simulate(params, { includeLossHarvesting: true, includeGainDeferral: true });
      const noLoss = simulate(params, { includeLossHarvesting: false, includeGainDeferral: true });
      const noDeferral = simulate(params, { includeLossHarvesting: true, includeGainDeferral: false });
      const lossValue = withBoth.directAfterTaxEnd - noLoss.directAfterTaxEnd;
      const deferralValue = withBoth.directAfterTaxEnd - noDeferral.directAfterTaxEnd;

      const withLiquidation = simulate(params, { terminalLiquidation: true });
      const withoutLiquidation = simulate(params, { terminalLiquidation: false });

      const endingPretaxGap = result.directPretax - result.benchmarkPretax;
      const endingAfterTaxGap = result.directAfterTaxEnd - result.benchmarkAfterTaxEnd;
      const taxAlphaDollars = endingAfterTaxGap - endingPretaxGap;
      const terminalPretaxBandText = `${dollars(result.directPretaxLow)} to ${dollars(result.directPretaxHigh)}`;
      const taxAlphaRangeText = `${pct(lowTaxAlpha)} to ${pct(highTaxAlpha)}`;
      const breakEvenTaxAlpha = Math.max(0, ((params.directIndexFee || 0) + (params.implementationDrag || 0) - (params.activeTiltAlpha || 0)) / 100);
      const taxAlphaAfterFee = result.taxAlpha - breakEvenTaxAlpha;
      const advancedClass = viewMode === "advanced" ? "" : "hidden";

      document.getElementById("app").innerHTML = `
        <div class="page">
          <header class="hero">
            <div class="hero-grid">
              <div>
                <div class="pill">Advisor education prototype</div>
                <h1>Direct Indexing Tax Alpha Explorer</h1>
                <p>Interactive illustration of pre-tax tracking, post-tax wealth, tax-loss harvesting, gain deferral, cash flows, transition constraints, and how volatility and tracking error widen after-tax outcomes.</p>
                <div class="hero-actions no-print">

                  <button class="mode-btn ${viewMode === "advanced" ? "active" : ""}" data-mode="advanced">Advanced mode</button>

                  <span class="share-status">${shareMessage}</span>

              </div>

                <div>Volatility: ${params.volatility.toFixed(1)}%</div>

              </div>
            </div>
          </header>

          <div class="layout">
            <aside class="stack no-print">
              <section class="card translucent preset-card">
                ${sectionHeader("Scenario presets", "Start with a realistic case, then tune the dials.", "Presets change assumptions only. They do not represent recommendations.")}
                <div class="preset-grid">
                  ${PRESETS.map(preset => `<button class="preset-tile" data-preset="${preset.id}"><strong>${preset.name}</strong><span>${preset.desc}</span></button>`).join("")}
                </div>
              </section>

              <section class="card translucent">
                <div class="section-head">
                  <div>
                    <h2 class="section-title">${label("Core inputs", "These assumptions drive the expected return path, tracking range, tax timing, and opportunity to harvest losses.")}</h2>

                </div>

                  ${slider("trackingError", "Tracking error", 0, 6, .1, "%", "", "Annualized active risk versus the benchmark. It widens the pre-tax and after-tax range but is not expected return by itself.")}
                  ${slider("ltTaxRate", "Long-term tax rate", 0, 45, .25, "%", "", "Combined long-term capital gains tax rate assumption, including federal, state, and surtax if relevant.")}
                  ${slider("stTaxRate", "Short-term / ordinary tax rate", 0, 55, .25, "%", "", "Combined short-term capital gains or ordinary income tax rate used to value short-term loss benefits.")}
                  ${toggle("includeLossHarvesting", "Include loss harvesting", "Turns on current tax savings from harvested losses. Harvesting also lowers tax basis, which may create larger future gains.")}
                  ${toggle("terminalLiquidation", "End-period liquidation tax", "Stress test that assumes the portfolio is sold at the end of the period and embedded gains are taxed.")}
                </div>
              </section>

              <section class="card translucent ${advancedClass}">

                <div class="controls">

                  ${slider("startingEmbeddedGainPct", "Starting embedded gain/loss", -20, 80, 1, "%", "", "Starting unrealized gain as a percent of portfolio value. Negative values represent an embedded loss or high basis.")}
                </div>
              </section>

              <section class="card translucent ${advancedClass}">
                ${sectionHeader("Advanced tax levers", "Separate harvesting, deferral, and transition limits.", "These controls show how much of the after-tax benefit comes from harvested losses, avoided gains, tax rates, and gain budgets.")}
                <div class="controls">
                  ${slider("harvestOpportunity", "Base harvest opportunity at 15% volatility", 0, 10, .25, "%", "", "Modeled annual harvested losses as a percent of portfolio value when volatility is 15%. The volatility dial scales this up or down.")}
                  ${selectControl("harvestCalibration", "Harvest calibration", [
                    { value: "conservative", label: "Conservative" },
                    { value: "balanced", label: "Balanced" },
                    { value: "optimistic", label: "Optimistic" }

                  ${slider("lossUtilization", "Loss utilization", 0, 100, 5, "%", "", "Percent of harvested losses assumed useful to the client through gains, income offsets, or carryforwards.")}
                  ${slider("shortTermLossShare", "Losses used at short-term rate", 0, 100, 5, "%", "", "Share of useful losses valued at the short-term or ordinary income tax rate. Higher short-term use usually means larger current tax benefit.")}
                  ${toggle("includeGainDeferral", "Include gain deferral", "Turns on tax-aware trading that avoids some annual realized gains relative to the benchmark.")}
                  ${slider("gainDeferral", "Gain deferral rate", 0, 100, 5, "%", "", "Percent of benchmark-like annual realized gains avoided by the direct index. Deferred gains may still be taxed later.")}
                  ${toggle("gainBudgetEnabled", "Use realized-gain budget", "Caps annual realized gains in the direct index. This is useful for transition-aware cases with legacy holdings.")}
                  ${slider("gainBudgetPct", "Annual gain budget", 0, 5, .25, "%", "", "Maximum direct-index realized gains as a percent of portfolio value when the gain-budget toggle is on.")}
                  ${toggle("reinvestTaxSavings", "Reinvest tax savings", "When on, harvested-loss tax savings are added back to the portfolio and compound. When off, they are counted as outside cash.")}
                </div>
              </section>
            </aside>

            <main class="stack">
              <section class="metrics">
                ${metric("Pre-tax DI vs benchmark", pct(result.pretaxActiveReturn), `${dollars(endingPretaxGap)} expected ending pre-tax gap`, result.pretaxActiveReturn >= 0, "Annualized pre-tax return difference between the direct index and benchmark. This strips out taxes.")}
                ${metric("Post-tax DI vs benchmark", pct(result.afterTaxActiveReturn), `${dollars(endingAfterTaxGap)} expected ending after-tax gap`, result.afterTaxActiveReturn >= 0, "Annualized after-tax return difference between the direct index and benchmark after annual taxes and optional liquidation tax.")}
                ${metric("Expected tax alpha", pct(result.taxAlpha), `${dollars(taxAlphaDollars)} contribution after removing pre-tax gap`, result.taxAlpha >= 0, "Post-tax relative return minus pre-tax relative return. This isolates the modeled contribution from tax management.")}
                ${metric("PV tax advantage", dollars(result.pvTaxAdvantage), `Discounts taxes at ${params.discountRate.toFixed(2)}%.`, result.pvTaxAdvantage >= 0, "Present value difference in total modeled tax burden. This highlights the economic value of paying taxes later instead of earlier.")}
                ${metric("Tax alpha range", taxAlphaRangeText, `Combined tracking-error and volatility range.`, undefined, "Range of measured tax alpha across simplified low/high tracking-error and harvesting scenarios.")}
                ${metric("Break-even tax alpha", pct(breakEvenTaxAlpha), `Modeled tax alpha ${pct(result.taxAlpha)}; cushion after fee/drag ${pct(taxAlphaAfterFee)}.`, result.taxAlpha >= breakEvenTaxAlpha, "Tax alpha needed to overcome explicit fee, implementation drag, and active-tilt drag.")}
              </section>

              <section class="card">
                ${sectionHeader("Scenario summary", "Plain-English explanation for advisor/client conversations.", "This summary updates automatically based on the selected assumptions.")}
                ${buildStory(params, result, endingAfterTaxGap, taxAlphaDollars, lossValue, deferralValue)}
              </section>

              <section class="card">
                ${sectionHeader("Tax alpha return bridge", "The advisor story in one chart: what happened before tax, what tax management added, and what the client kept after tax.", "The bridge uses annualized return differences. Tax alpha is the gap between post-tax relative return and pre-tax relative return.")}
                ${returnBridgeChart(result.pretaxActiveReturn, result.taxAlpha, result.afterTaxActiveReturn)}
              </section>

              <div class="two-col">
                <section class="card">
                  ${sectionHeader("Fee versus tax alpha", "Shows whether modeled tax alpha clears the explicit fee and implementation hurdle.", "This separates the 10 bps default fee from other pre-tax drag and from tax alpha.")}
                  ${feeAlphaBridgeChart(params, result)}
                </section>
                <section class="card">
                  ${sectionHeader("Client fit checklist", "Quick read on whether the assumptions are favorable for direct indexing.", "This is a qualitative screen, not a recommendation.")}
                  ${fitChecklist(params, result)}
                </section>
              </div>

              <div class="two-col">
                <section class="card">
                  ${sectionHeader("Tax drag comparison", "Direct indexing is often about reducing tax drag, not creating magic investment alpha.", "Tax drag is after-tax CAGR minus pre-tax CAGR. Less negative tax drag means more of the return was kept after tax.")}
                  ${taxDragChart(result)}
                </section>
                <section class="card">
                  ${sectionHeader("Liquidation versus continued deferral", "Exit plan matters. A future tax bill is not the same as taxes paid every year.", "This compares a full sale at the horizon with continued deferral at the horizon.")}
                  ${comparisonCards(withLiquidation, withoutLiquidation)}
                </section>
              </div>

              <section class="card">
                ${sectionHeader("Benefit decomposition", "Expected-case dollar bridge from benchmark after-tax wealth to direct-index after-tax wealth.", "This is the central expected case. Tracking error affects the outcome range, not this single point estimate.")}
                ${benefitWaterfall(result, endingPretaxGap, taxAlphaDollars)}
                <div class="soft-box"><strong>Tracking-error note:</strong> this decomposition uses the expected direct-index path. Tracking error changes the pre-tax difference in the low/high scenarios, which is why it appears in the outcome bands rather than in this single expected bridge.</div>
              </section>

              <div class="two-col">
                <section class="card">
                  ${sectionHeader("Pre-tax tracking error band", "Tracking error widens the range around expected direct indexing pre-tax wealth.", "The shaded band is a one-standard-deviation relative return range around the expected direct index path.")}
                  ${trackingBandChart(result.rows)}
                </section>
                <section class="card">
                  ${sectionHeader("After-tax wealth and combined outcome band", "The green band combines tracking-error dispersion with lower/higher harvesting outcomes.", "This band combines both investment tracking outcomes and tax-harvesting outcomes, so it is broader than the pre-tax tracking band alone.")}
                  ${wealthChart(result.rows, lowResult.rows, highResult.rows)}
                </section>
              </div>

              <div class="two-col">
                <section class="card">
                  ${sectionHeader("Cumulative tax burden over time", "Shows how tax timing differs between the benchmark and direct index.", "This includes annual taxes and, if toggled on, the end-period liquidation tax at each horizon.")}
                  ${taxPaidChart(result.rows)}
                </section>
                <section class="card">
                  ${sectionHeader("Losses used now versus taxes later", "Separates current harvested-loss value from possible future tax recapture.", "Harvesting can create current tax value while reducing basis. The net benefit depends on tax rates, timing, and whether the portfolio is eventually sold.")}
                  ${lossTimingChart(result)}
                </section>
              </div>

              <div class="lever-grid">
                <section class="card">
                  ${sectionHeader("Power of each tax lever", "Incremental ending after-tax dollars from turning on each lever.", "This separates the two main engines: current-year value from harvesting losses and future value from deferring realized gains.")}
                  <div class="lever-content">
                    <div>${barBreakdown(lossValue, deferralValue)}</div>
                    <div class="mini-stack">
                      <div class="soft-box"><strong>Loss harvesting:</strong> ${dollars(lossValue)} ${info("Incremental ending after-tax wealth from turning loss harvesting on, holding gain deferral on.")}</div>
                      <div class="soft-box"><strong>Gain deferral:</strong> ${dollars(deferralValue)} ${info("Incremental ending after-tax wealth from turning gain deferral on, holding loss harvesting on.")}</div>
                      <div class="soft-box"><strong>Expected annual harvest opportunity:</strong> ${pct(result.effectiveHarvestOpportunity, 2)} ${info("Modeled harvested losses as a percent of portfolio value after scaling the base assumption by volatility.")}</div>
                      <div class="soft-box"><strong>Volatility-driven harvest range:</strong> ${pct(lowResult.effectiveHarvestOpportunity, 2)} to ${pct(highResult.effectiveHarvestOpportunity, 2)} ${info("Low-to-high range around expected harvesting opportunity. This is a simple assumption, not a prediction.")}</div>
                    </div>
                  </div>
                </section>

                <section class="card">
                  ${sectionHeader("Outcome bridge", "Useful for advisor/client conversations.", "This table converts the charts into dollar and annualized return terms.")}
                  <div class="table-wrap">
                    <table>
                      <thead>
                        <tr><th>Measure</th><th class="right">Benchmark</th><th class="right">Direct index</th><th class="right">Difference</th></tr>
                      </thead>
                      <tbody>
                        <tr><td class="bold">Pre-tax ending value ${info("Portfolio value before any annual or end-period taxes.")}</td><td class="right">${dollars(result.benchmarkPretax)}</td><td class="right">${dollars(result.directPretax)}</td><td class="right bold">${dollars(endingPretaxGap)}</td></tr>
                        <tr><td class="bold">After-tax ending value ${info("Portfolio value after modeled annual taxes and optional end-period liquidation tax.")}</td><td class="right">${dollars(result.benchmarkAfterTaxEnd)}</td><td class="right">${dollars(result.directAfterTaxEnd)}</td><td class="right bold">${dollars(endingAfterTaxGap)}</td></tr>
                        <tr><td class="bold">Direct after-tax range ${info("Range across simplified low/high tracking-error and harvesting scenarios.")}</td><td class="right">—</td><td class="right">${dollars(lowResult.directAfterTaxEnd)} to ${dollars(highResult.directAfterTaxEnd)}</td><td class="right bold">Tax alpha: ${taxAlphaRangeText}</td></tr>
                        <tr><td class="bold">Pre-tax CAGR ${info("Annualized return before taxes.")}</td><td class="right">${pct(result.benchmarkPretaxCagr)}</td><td class="right">${pct(result.directPretaxCagr)}</td><td class="right bold">${pct(result.pretaxActiveReturn)}</td></tr>
                        <tr><td class="bold">After-tax CAGR ${info("Annualized return after taxes.")}</td><td class="right">${pct(result.benchmarkAfterTaxCagr)}</td><td class="right">${pct(result.directAfterTaxCagr)}</td><td class="right bold">${pct(result.afterTaxActiveReturn)}</td></tr>
                        <tr><td class="bold">PV of total tax burden ${info("Present value of annual taxes plus end-period liquidation tax, less harvesting tax savings for the direct index.")}</td><td class="right">${dollars(result.pvBenchmarkTotalTaxes)}</td><td class="right">${dollars(result.pvDirectTotalTaxes)}</td><td class="right bold">${dollars(result.pvTaxAdvantage)}</td></tr>
                        <tr><td class="bold">Annual realized-gain taxes ${info("Nominal annual taxes from realized gains over the full horizon. This excludes end-period liquidation tax.", "up")}</td><td class="right">${dollars(result.totalBenchmarkAnnualTax)}</td><td class="right">${dollars(result.totalDirectAnnualTax)}</td><td class="right bold">${dollars(result.totalBenchmarkAnnualTax - result.totalDirectAnnualTax)}</td></tr>
                        <tr><td class="bold">End-period liquidation tax ${info("Estimated tax due if the entire portfolio is sold at the end of the period.", "up")}</td><td class="right">${dollars(result.terminalBenchmarkTax)}</td><td class="right">${dollars(result.terminalDirectTax)}</td><td class="right bold">${dollars(result.terminalBenchmarkTax - result.terminalDirectTax)}</td></tr>
                      </tbody>
                    </table>
                  </div>
                </section>
              </div>

              <section class="card">
                ${sectionHeader("Plain-English advisor talking points", "Designed to keep the explanation honest and simple.", "These are phrased for advisor/client conversations, not as investment recommendations.")}
                <div class="talking-points">
                  <div class="soft-box"><strong>Tracking error flows through to after-tax wealth.</strong><br>It widens the pre-tax range and the after-tax outcome range. It is not tax alpha by itself, but it changes the taxable path the client experiences.</div>
                  <div class="soft-box"><strong>Volatility powers the harvesting range.</strong><br>At ${params.volatility.toFixed(1)}% volatility, expected harvest opportunity is ${pct(result.effectiveHarvestOpportunity, 2)}, with a range of ${pct(lowResult.effectiveHarvestOpportunity, 2)} to ${pct(highResult.effectiveHarvestOpportunity, 2)}.</div>
                  <div class="soft-box"><strong>Gain deferral is quiet but powerful.</strong><br>Avoided annual realized-gain taxes stay invested. Even when taxes are eventually paid, a future tax bill is worth less than the same tax paid today.</div>
                </div>
              </section>

              <section class="card">
                ${sectionHeader("Disclosures and model limitations", "Keep this visible before using the output with advisors or clients.", "This section is intentionally explicit to reduce overpromising.")}
                <div class="disclosure-grid">
                  <div class="disclaimer"><strong>Educational illustration only.</strong><br>This simplified model is hypothetical and is not investment, tax, legal, or accounting advice.</div>
                  <div class="disclaimer"><strong>Tax benefits are not guaranteed.</strong><br>Losses must be available and usable. Wash-sale rules, client tax facts, and tax law changes can materially change outcomes.</div>
                  <div class="disclaimer"><strong>Tracking error can help or hurt.</strong><br>The tool shows ranges, but actual security-level dispersion, cash flows, transition taxes, and implementation costs may differ.</div>

          </div>
        </div>
      `;

      attachEvents();
    }

    function attachEvents() {
      document.querySelectorAll("input[data-key]").forEach(input => {
        input.addEventListener("input", e => {
          const key = e.target.dataset.key;
          params[key] = Number(e.target.value);
          shareMessage = "";
          render();
        });
      });

      document.querySelectorAll("select[data-select]").forEach(select => {
        select.addEventListener("change", e => {
          const key = e.target.dataset.select;
          params[key] = e.target.value;
          shareMessage = "";
          render();
        });
      });

      document.querySelectorAll("button[data-toggle]").forEach(button => {
        button.addEventListener("click", e => {
          const key = e.currentTarget.dataset.toggle;
          params[key] = !params[key];
          shareMessage = "";
          render();
        });
      });

      document.querySelectorAll("button[data-mode]").forEach(button => {
        button.addEventListener("click", e => {
          viewMode = e.currentTarget.dataset.mode;
          render();
        });
      });

      document.querySelectorAll("button[data-preset]").forEach(button => {
        button.addEventListener("click", e => {
          const preset = PRESETS.find(item => item.id === e.currentTarget.dataset.preset);
          if (!preset) return;
          params = preset.reset ? { ...DEFAULTS } : { ...params, ...preset.values };
          shareMessage = `Applied: ${preset.name}`;
          render();
        });
      });

      const reset = document.getElementById("resetBtn");
      if (reset) {
        reset.addEventListener("click", () => {
          params = { ...DEFAULTS };
          shareMessage = "";
          render();
        });
      }

      const copyBtn = document.getElementById("copyLinkBtn");
      if (copyBtn) copyBtn.addEventListener("click", copyScenarioLink);

      const printBtn = document.getElementById("printBtn");
      if (printBtn) printBtn.addEventListener("click", () => window.print());
    }

    loadScenarioFromHash();
    render();
  </script>
</body>
</html>
