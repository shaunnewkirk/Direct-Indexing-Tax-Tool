<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Direct Indexing Tax Alpha Explorer</title>
  <style>
    :root{
      --bg:#f8fafc; --card:#fff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --soft:#f1f5f9;
      --dark:#020617; --good:#059669; --bad:#dc2626; --good-bg:#ecfdf5; --good-line:#a7f3d0;
      --bad-bg:#fff1f2; --bad-line:#fecdd3; --amber-bg:#fffbeb; --amber-line:#fde68a; --amber-ink:#78350f;
      --blue-bg:#eff6ff; --blue-line:#bfdbfe;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    button,input,select{font:inherit}
    .page{max-width:1480px;margin:0 auto;padding:24px}
    .hero{background:var(--dark);color:#fff;border-radius:28px;padding:32px;box-shadow:0 18px 45px rgba(15,23,42,.2)}
    .hero-grid{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:end}
    .pill{display:inline-flex;border-radius:999px;background:rgba(255,255,255,.1);padding:6px 12px;color:#cbd5e1;font-size:12px;font-weight:850;text-transform:uppercase;letter-spacing:.06em}
    h1{margin:14px 0 0;font-size:clamp(32px,5vw,56px);line-height:1;letter-spacing:-.05em}
    .hero p{margin:16px 0 0;max-width:880px;color:#cbd5e1;line-height:1.6}
    .scenario{min-width:290px;border-radius:22px;background:rgba(255,255,255,.1);padding:18px;color:#cbd5e1;font-size:14px;line-height:1.7}
    .scenario strong{display:block;color:#fff}
    .hero-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}.share-status{color:#cbd5e1;font-size:12px;align-self:center}
    .action-btn,.mode-btn{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.1);color:#fff;border-radius:999px;padding:9px 13px;font-size:12px;font-weight:850;cursor:pointer}.mode-btn.active,.action-btn.light{background:#fff;color:var(--dark);border-color:#fff}
    .layout{display:grid;grid-template-columns:410px minmax(0,1fr);gap:24px;margin-top:24px;align-items:start}.stack{display:grid;gap:24px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:28px;padding:22px;box-shadow:0 6px 18px rgba(15,23,42,.05)}.card.translucent{background:rgba(255,255,255,.72)}
    .section-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px}.section-title{margin:0;font-size:20px;line-height:1.2;letter-spacing:-.025em}.section-subtitle{margin:6px 0 0;color:var(--muted);font-size:14px;line-height:1.55}
    .reset{border:1px solid var(--line);background:#fff;color:#334155;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:850;cursor:pointer;box-shadow:0 3px 8px rgba(15,23,42,.05)}
    .preset-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.preset-tile{border:1px solid var(--line);background:#fff;border-radius:18px;padding:10px 11px;cursor:pointer;text-align:left;box-shadow:0 2px 8px rgba(15,23,42,.04)}.preset-tile strong{display:block;color:var(--ink);font-size:13px;line-height:1.25}.preset-tile span{display:block;margin-top:4px;color:var(--muted);font-size:11px;line-height:1.3}
    .controls{display:grid;gap:14px}.control{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 2px 8px rgba(15,23,42,.04)}.control-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .label{display:inline-flex;align-items:center;gap:5px;font-size:14px;font-weight:850;color:var(--ink)}
    .info{position:relative;display:inline-flex;justify-content:center;align-items:center;width:17px;height:17px;border:1px solid #cbd5e1;border-radius:50%;color:#64748b;background:#fff;font-size:11px;line-height:1;font-weight:900;cursor:help;flex:0 0 auto}.info::after{content:attr(data-tip);display:none;position:absolute;top:24px;left:50%;transform:translateX(-50%);z-index:100;width:290px;padding:12px;border-radius:16px;background:#020617;color:#fff;font-size:12px;line-height:1.45;font-weight:600;box-shadow:0 20px 35px rgba(15,23,42,.25);white-space:normal}.info:hover::after,.info:focus::after{display:block}.info.tip-up::after{top:auto;bottom:24px}
    .number-box,.select-box{display:flex;align-items:center;justify-content:flex-end;min-width:116px;border-radius:14px;background:var(--soft);padding:6px 8px;font-size:14px;font-weight:850}.number-box input{width:80px;border:0;outline:0;background:transparent;text-align:right;font-weight:850;color:var(--ink)}.select-box select{width:150px;border:0;outline:0;background:transparent;font-weight:850;color:var(--ink)}
    .range{width:100%;margin-top:12px;accent-color:var(--dark)}.minmax{display:flex;justify-content:space-between;margin-top:4px;color:#94a3b8;font-size:11px}
    .toggle{display:flex;align-items:center;justify-content:space-between;gap:16px;width:100%;text-align:left;border:1px solid var(--line);border-radius:20px;background:#fff;padding:16px;cursor:pointer;box-shadow:0 2px 8px rgba(15,23,42,.04)}.switch{width:48px;height:28px;border-radius:999px;background:#cbd5e1;position:relative;flex:0 0 auto;transition:.18s ease}.switch::before{content:"";position:absolute;top:4px;left:4px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.18s ease;box-shadow:0 2px 6px rgba(15,23,42,.25)}.switch.on{background:var(--dark)}.switch.on::before{transform:translateX(20px)}
    .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}.metric{border:1px solid var(--line);border-radius:24px;padding:18px;background:#fff;box-shadow:0 3px 12px rgba(15,23,42,.04)}.metric.good{background:var(--good-bg);border-color:var(--good-line)}.metric.bad{background:var(--bad-bg);border-color:var(--bad-line)}.metric-label{color:var(--muted);font-size:13px;font-weight:850}.metric-value{margin-top:10px;font-size:24px;font-weight:950;letter-spacing:-.04em;color:var(--ink)}.metric-sub{margin-top:9px;color:var(--muted);font-size:12px;line-height:1.45}
    .two-col,.three-col{display:grid;gap:24px;align-items:start}.two-col{grid-template-columns:repeat(2,minmax(0,1fr))}.three-col{grid-template-columns:repeat(3,minmax(0,1fr))}.lever-grid{display:grid;grid-template-columns:1fr;gap:24px}.lever-content{display:grid;grid-template-columns:minmax(320px,.9fr) minmax(320px,1.1fr);gap:18px;align-items:start}
    svg.chart{width:100%;height:auto;max-height:360px;display:block;background:#fff;border-radius:18px;overflow:visible}.legend{display:flex;flex-wrap:wrap;gap:16px;margin-top:12px;color:#334155;font-size:15px}.legend-item{display:inline-flex;align-items:center;gap:8px}.dot{width:12px;height:12px;border-radius:999px;background:#0f172a;display:inline-block}
    .soft-box{background:var(--soft);border-radius:18px;padding:14px;font-size:14px;line-height:1.55;color:#475569}.soft-box strong{color:var(--ink)}.story-box{background:var(--blue-bg);border:1px solid var(--blue-line);border-radius:22px;padding:18px;line-height:1.65;color:#1e3a8a}.story-box strong{color:#0f172a}.mini-stack{display:grid;gap:12px;margin-top:14px}
    .table-wrap{border:1px solid var(--line);border-radius:18px;overflow-x:auto;overflow-y:visible}table{width:100%;min-width:760px;border-collapse:collapse;font-size:14px}th{background:var(--soft);color:#64748b;font-size:12px;text-transform:uppercase;letter-spacing:.06em;text-align:left;padding:12px 14px;white-space:nowrap}td{padding:12px 14px;border-top:1px solid #f1f5f9;white-space:nowrap}.right{text-align:right}.bold{font-weight:850}
    .talking-points,.disclosure-grid,.comparison-grid,.fit-grid{display:grid;gap:14px}.talking-points{grid-template-columns:repeat(3,minmax(0,1fr))}.disclosure-grid,.comparison-grid,.fit-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.disclaimer{border:1px solid var(--amber-line);border-radius:18px;background:var(--amber-bg);color:var(--amber-ink);padding:14px;font-size:12px;line-height:1.55}
    .comparison-card{background:var(--soft);border-radius:18px;padding:16px;display:grid;gap:10px}.comparison-card h3{margin:0;font-size:16px;line-height:1.2}.comparison-stat{display:flex;justify-content:space-between;gap:12px;border-top:1px solid #e2e8f0;padding-top:9px;color:#475569;font-size:14px}.comparison-stat strong{color:var(--ink);white-space:nowrap}
    .fit-item{border-radius:16px;padding:12px;font-size:13px;line-height:1.45;border:1px solid var(--line);background:#fff}.fit-item.good{border-color:var(--good-line);background:var(--good-bg)}.fit-item.watch{border-color:var(--amber-line);background:var(--amber-bg);color:var(--amber-ink)}.fit-item strong{display:block;color:var(--ink);margin-bottom:3px}
    .scenario-selector{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 16px}.scenario-choice{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:8px 11px;font-size:12px;font-weight:850;cursor:pointer}.scenario-choice.active{background:var(--dark);color:#fff;border-color:var(--dark)}.range-table{display:grid;gap:8px;margin-top:12px}.range-row{display:grid;grid-template-columns:1fr auto auto auto;gap:12px;align-items:center;border-radius:14px;background:var(--soft);padding:10px 12px;font-size:13px}.range-row strong{color:var(--ink)}.range-row span{color:#475569;white-space:nowrap}.hidden{display:none!important}
    @media(max-width:1180px){.layout,.hero-grid{grid-template-columns:1fr}.two-col,.three-col,.lever-grid,.lever-content,.talking-points,.disclosure-grid,.comparison-grid,.fit-grid{grid-template-columns:1fr}.range-row{grid-template-columns:1fr;gap:4px}}
    @media(max-width:640px){.page{padding:12px}.hero,.card{border-radius:20px;padding:18px}.preset-grid{grid-template-columns:1fr}.control-top{flex-direction:column}.number-box,.select-box{width:100%;justify-content:flex-end}.info::after{width:230px;left:auto;right:-20px;transform:none}td,th{font-size:12px;padding:10px}}
    @media print{body{background:#fff}.page{max-width:none;padding:0}.hero-actions,aside,.no-print,.preset-card{display:none!important}.layout{display:block}.card,.metric,.hero{box-shadow:none;break-inside:avoid}.hero{border-radius:0}svg.chart{max-height:260px}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const DEFAULTS={initialInvestment:1000000,years:10,discountRate:5.0,benchmarkReturn:7.0,directIndexFee:0.10,implementationDrag:0.00,activeTiltAlpha:0.00,trackingError:1.5,volatility:15.0,benchmarkRealizedGains:2.5,includeLossHarvesting:true,harvestOpportunity:3.5,harvestCalibration:"balanced",lossUtilization:90,shortTermLossShare:65,includeGainDeferral:true,gainDeferral:75,gainBudgetEnabled:false,gainBudgetPct:1.0,ltTaxRate:23.8,stTaxRate:40.8,annualContribution:0,annualWithdrawal:0,startingEmbeddedGainPct:0,reinvestTaxSavings:true,terminalLiquidation:true};
    const PRESETS=[
      {id:"balanced",name:"Balanced default",desc:"Base case for a taxable equity allocation.",reset:true,values:{}},
      {id:"highTax",name:"High-tax client",desc:"Higher tax rates and better loss utilization.",values:{ltTaxRate:33,stTaxRate:50,lossUtilization:100,shortTermLossShare:80,discountRate:5}},
      {id:"volatile",name:"Volatile market",desc:"Wider outcomes and more harvesting opportunity.",values:{volatility:25,trackingError:2.5,harvestOpportunity:4.5,harvestCalibration:"balanced"}},
      {id:"lowVol",name:"Low-vol market",desc:"Lower harvesting opportunity and tighter bands.",values:{volatility:8,trackingError:1,harvestOpportunity:2.5,harvestCalibration:"conservative"}},
      {id:"noLiquidation",name:"Continued deferral",desc:"No assumed sale at the horizon.",values:{terminalLiquidation:false,years:15}},
      {id:"embeddedGain",name:"Large embedded gain",desc:"Transition-aware case with legacy appreciation.",values:{startingEmbeddedGainPct:35,gainBudgetEnabled:true,gainBudgetPct:.75,benchmarkRealizedGains:1.5}},
      {id:"taxBudget",name:"Tax-budgeted transition",desc:"Limits annual realized gains in the direct index.",values:{gainBudgetEnabled:true,gainBudgetPct:.5,gainDeferral:85,benchmarkRealizedGains:3}}
    ];
    let params={...DEFAULTS}; let viewMode="simple"; let bridgeScenario="expected"; let shareMessage="";
    const money=new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0});
    const dollars=v=>money.format(Number.isFinite(v)?v:0);
    function compactDollars(value){const safe=Number.isFinite(value)?value:0,abs=Math.abs(safe); if(abs>=1e6)return "$"+(safe/1e6).toFixed(abs<1e7?1:0)+"M"; if(abs>=1e3)return "$"+Math.round(safe/1e3)+"k"; return dollars(safe)}
    const pct=(v,d=2)=>((Number.isFinite(v)?v:0)*100).toFixed(d)+"%";
    function cagr(endValue,startValue,years){if(endValue<=0||startValue<=0||years<=0)return 0; return Math.pow(endValue/startValue,1/years)-1}
    function escapeAttr(text){return String(text||"").replaceAll("&","&amp;").replaceAll('"',"&quot;").replaceAll("<","&lt;").replaceAll(">","&gt;")}
    function info(text,direction="down"){if(!text)return ""; const cls=direction==="up"?" tip-up":""; return `<span class="info${cls}" tabindex="0" data-tip="${escapeAttr(text)}">i</span>`}
    function label(text,tip){return `<span class="label"><span>${text}</span>${info(tip)}</span>`}
    function harvestCalibrationMultiplier(v){if(v==="conservative")return .7;if(v==="optimistic")return 1.25;return 1}
    function taxAlphaBandMultipliers(vol){const spread=Math.min(.75,Math.max(.15,.12+vol/100));return{spread,low:Math.max(0,1-spread),high:1+spread}}
    function getEffectiveHarvestOpportunity(p,includeLossHarvesting,hm=1){if(!includeLossHarvesting)return 0;const base=Math.max(0,p.harvestOpportunity)/100;const norm=Math.max(.01,p.volatility/15);const vm=Math.pow(norm,1.15);return Math.min(.25,base*vm*harvestCalibrationMultiplier(p.harvestCalibration)*hm)}
    function applyContribution(value,basis,contribution){const a=Math.max(0,contribution);return{value:value+a,basis:basis+a}}
    function applyWithdrawal(value,basis,withdrawal,ltTaxRate){const a=Math.min(Math.max(0,withdrawal),Math.max(0,value));if(a<=0||value<=0)return{value,basis,tax:0};const gainRatio=Math.max(0,value-basis)/value;const basisRatio=Math.min(1,Math.max(0,basis/value));const realizedGain=a*gainRatio;const tax=realizedGain*ltTaxRate;return{value:Math.max(0,value-a-tax),basis:Math.max(0,basis-a*basisRatio),tax}}
    function simulate(p,overrides={}){
      const includeLossHarvesting=overrides.includeLossHarvesting??p.includeLossHarvesting;const includeGainDeferral=overrides.includeGainDeferral??p.includeGainDeferral;const harvestOpportunityMultiplier=overrides.harvestOpportunityMultiplier??1;const trackingBandSign=overrides.trackingBandSign??0;const terminalLiquidation=overrides.terminalLiquidation??p.terminalLiquidation;
      const initial=Math.max(1,p.initialInvestment);const years=Math.max(1,Math.round(p.years));const benchmarkReturn=p.benchmarkReturn/100;const feeDrag=Math.max(0,p.directIndexFee||0);const implementationDrag=Math.max(0,p.implementationDrag||0);const activeTiltAlpha=p.activeTiltAlpha||0;const expectedPretaxDiff=activeTiltAlpha-feeDrag-implementationDrag;const baseDirectIndexReturn=(p.benchmarkReturn+expectedPretaxDiff)/100;const trackingError=Math.max(0,p.trackingError)/100;const ltTaxRate=p.ltTaxRate/100;const stTaxRate=p.stTaxRate/100;const discountRate=Math.max(0,p.discountRate)/100;const realizedGainPct=p.benchmarkRealizedGains/100;const gainDeferralRate=includeGainDeferral?p.gainDeferral/100:0;const effectiveHarvestOpportunity=getEffectiveHarvestOpportunity(p,includeLossHarvesting,harvestOpportunityMultiplier);const lossUtilization=p.lossUtilization/100;const shortTermShare=p.shortTermLossShare/100;const harvestBenefitRate=shortTermShare*stTaxRate+(1-shortTermShare)*ltTaxRate;const annualContribution=Math.max(0,p.annualContribution||0);const annualWithdrawal=Math.max(0,p.annualWithdrawal||0);const startingEmbeddedGainPct=Math.max(-50,Math.min(90,p.startingEmbeddedGainPct||0))/100;const initialBasis=Math.max(0,initial*(1-startingEmbeddedGainPct));
      let benchmarkPretax=initial,directPretax=initial,benchmarkValue=initial,benchmarkBasis=initialBasis,directValue=initial,directBasis=initialBasis,outsideTaxSavings=0,totalBenchmarkAnnualTax=0,totalDirectAnnualTax=0,pvBenchmarkAnnualTaxes=0,pvDirectAnnualTaxes=0,pvHarvestTaxSavings=0,totalHarvestedLosses=0,totalHarvestTaxSavings=0,cumulativeBenchmarkTax=0,cumulativeDirectNetTax=0;
      const rows=[{year:0,benchmarkPretax:initial,directPretax:initial,directPretaxLow:initial,directPretaxHigh:initial,benchmarkAfterTax:initial,directAfterTax:initial,benchmarkCumulativeTax:0,directCumulativeTax:0,benchmarkCumulativeTaxWithLiquidation:0,directCumulativeTaxWithLiquidation:0}];
      for(let year=1;year<=years;year++){
        let bc=applyContribution(benchmarkValue,benchmarkBasis,annualContribution);benchmarkValue=bc.value;benchmarkBasis=bc.basis;let dc=applyContribution(directValue,directBasis,annualContribution);directValue=dc.value;directBasis=dc.basis;benchmarkPretax+=annualContribution;directPretax+=annualContribution;
        const activeTrackingShock=trackingBandSign*trackingError*(Math.sqrt(year)-Math.sqrt(year-1));const directIndexReturn=(1+baseDirectIndexReturn)*Math.exp(activeTrackingShock)-1;
        benchmarkPretax*=1+benchmarkReturn;directPretax*=1+directIndexReturn;
        const benchmarkGross=benchmarkValue*(1+benchmarkReturn);const benchmarkAppreciation=Math.max(0,benchmarkGross-benchmarkBasis);const benchmarkRealizedGain=Math.min(benchmarkAppreciation,benchmarkGross*realizedGainPct);let benchmarkAnnualTax=benchmarkRealizedGain*ltTaxRate;benchmarkBasis+=benchmarkRealizedGain;benchmarkValue=benchmarkGross-benchmarkAnnualTax;
        const directGross=directValue*(1+directIndexReturn);const directAppreciation=Math.max(0,directGross-directBasis);let directRealizedGain=Math.min(directAppreciation,directGross*realizedGainPct*(1-gainDeferralRate));if(p.gainBudgetEnabled){directRealizedGain=Math.min(directRealizedGain,directGross*Math.max(0,p.gainBudgetPct)/100)}let directAnnualTax=directRealizedGain*ltTaxRate;
        const harvestedLoss=directGross*effectiveHarvestOpportunity*lossUtilization;const harvestTaxSavings=harvestedLoss*harvestBenefitRate;let nextDirectBasis=directBasis+directRealizedGain-harvestedLoss;let nextDirectValue=directGross-directAnnualTax;if(includeLossHarvesting){if(p.reinvestTaxSavings){nextDirectValue+=harvestTaxSavings;nextDirectBasis+=harvestTaxSavings}else{outsideTaxSavings+=harvestTaxSavings}}
        directBasis=Math.max(0,nextDirectBasis);directValue=nextDirectValue;
        const bw=applyWithdrawal(benchmarkValue,benchmarkBasis,annualWithdrawal,ltTaxRate);benchmarkValue=bw.value;benchmarkBasis=bw.basis;benchmarkAnnualTax+=bw.tax;const dw=applyWithdrawal(directValue,directBasis,annualWithdrawal,ltTaxRate);directValue=dw.value;directBasis=dw.basis;directAnnualTax+=dw.tax;benchmarkPretax=Math.max(0,benchmarkPretax-annualWithdrawal);directPretax=Math.max(0,directPretax-annualWithdrawal);
        totalBenchmarkAnnualTax+=benchmarkAnnualTax;totalDirectAnnualTax+=directAnnualTax;const discountFactor=Math.pow(1+discountRate,year);pvBenchmarkAnnualTaxes+=benchmarkAnnualTax/discountFactor;pvDirectAnnualTaxes+=directAnnualTax/discountFactor;pvHarvestTaxSavings+=harvestTaxSavings/discountFactor;totalHarvestedLosses+=harvestedLoss;totalHarvestTaxSavings+=harvestTaxSavings;cumulativeBenchmarkTax+=benchmarkAnnualTax;cumulativeDirectNetTax+=directAnnualTax-harvestTaxSavings;
        const bt=terminalLiquidation?Math.max(0,benchmarkValue-benchmarkBasis)*ltTaxRate:0;const dt=terminalLiquidation?Math.max(0,directValue-directBasis)*ltTaxRate:0;const tbf=Math.exp(trackingError*Math.sqrt(year));
        rows.push({year,benchmarkPretax,directPretax,directPretaxLow:directPretax/tbf,directPretaxHigh:directPretax*tbf,benchmarkAfterTax:benchmarkValue-bt,directAfterTax:directValue-dt+outsideTaxSavings,benchmarkCumulativeTax:cumulativeBenchmarkTax,directCumulativeTax:cumulativeDirectNetTax,benchmarkCumulativeTaxWithLiquidation:cumulativeBenchmarkTax+bt,directCumulativeTaxWithLiquidation:cumulativeDirectNetTax+dt});
      }
      const terminalBenchmarkTax=terminalLiquidation?Math.max(0,benchmarkValue-benchmarkBasis)*ltTaxRate:0;const terminalDirectTax=terminalLiquidation?Math.max(0,directValue-directBasis)*ltTaxRate:0;const terminalDiscountFactor=Math.pow(1+discountRate,years);const pvBenchmarkTerminalTax=terminalBenchmarkTax/terminalDiscountFactor;const pvDirectTerminalTax=terminalDirectTax/terminalDiscountFactor;const pvBenchmarkTotalTaxes=pvBenchmarkAnnualTaxes+pvBenchmarkTerminalTax;const pvDirectTotalTaxes=pvDirectAnnualTaxes-pvHarvestTaxSavings+pvDirectTerminalTax;const pvTaxAdvantage=pvBenchmarkTotalTaxes-pvDirectTotalTaxes;const benchmarkAfterTaxEnd=benchmarkValue-terminalBenchmarkTax;const directAfterTaxEnd=directValue-terminalDirectTax+outsideTaxSavings;const benchmarkPretaxCagr=cagr(benchmarkPretax,initial,years);const directPretaxCagr=cagr(directPretax,initial,years);const benchmarkAfterTaxCagr=cagr(benchmarkAfterTaxEnd,initial,years);const directAfterTaxCagr=cagr(directAfterTaxEnd,initial,years);const pretaxActiveReturn=directPretaxCagr-benchmarkPretaxCagr;const afterTaxActiveReturn=directAfterTaxCagr-benchmarkAfterTaxCagr;const taxAlpha=afterTaxActiveReturn-pretaxActiveReturn;const terminalRow=rows[rows.length-1];
      return{rows,initial,years,benchmarkPretax,directPretax,directPretaxLow:terminalRow.directPretaxLow,directPretaxHigh:terminalRow.directPretaxHigh,benchmarkAfterTaxEnd,directAfterTaxEnd,benchmarkPretaxCagr,directPretaxCagr,benchmarkAfterTaxCagr,directAfterTaxCagr,benchmarkTaxDrag:benchmarkAfterTaxCagr-benchmarkPretaxCagr,directTaxDrag:directAfterTaxCagr-directPretaxCagr,pretaxActiveReturn,afterTaxActiveReturn,taxAlpha,terminalBenchmarkTax,terminalDirectTax,totalBenchmarkAnnualTax,totalDirectAnnualTax,pvBenchmarkTotalTaxes,pvDirectTotalTaxes,pvTaxAdvantage,pvHarvestTaxSavings,pvBenchmarkTerminalTax,pvDirectTerminalTax,totalHarvestedLosses,totalHarvestTaxSavings,harvestBenefitRate,effectiveHarvestOpportunity};
    }
    function slider(key,labelText,min,max,step,suffix,prefix,tip){const v=params[key];return `<div class="control"><div class="control-top"><div>${label(labelText,tip)}</div><div class="number-box"><span>${prefix||""}</span><input type="number" data-key="${key}" min="${min}" max="${max}" step="${step}" value="${v}"><span>${suffix||""}</span></div></div><input class="range" type="range" data-key="${key}" min="${min}" max="${max}" step="${step}" value="${v}"><div class="minmax"><span>${prefix||""}${min}${suffix||""}</span><span>${prefix||""}${max}${suffix||""}</span></div></div>`}

      document.getElementById("app").innerHTML=`<div class="page"><header class="hero"><div class="hero-grid"><div><div class="pill">Advisor education prototype</div><h1>Direct Indexing Tax Alpha Explorer</h1><p>Interactive illustration of pre-tax tracking, post-tax wealth, tax-loss harvesting, gain deferral, cash flows, transition constraints, and how volatility and tracking error widen after-tax outcomes.</p><div class="hero-actions no-print"><button class="mode-btn ${viewMode==="simple"?"active":""}" data-mode="simple">Simple mode</button><button class="mode-btn ${viewMode==="advanced"?"active":""}" data-mode="advanced">Advanced mode</button><button class="action-btn light" id="copyLinkBtn">Copy scenario link</button><button class="action-btn" id="printBtn">Print / save PDF</button><span class="share-status">${shareMessage}</span></div></div><div class="scenario"><strong>Current scenario</strong><div>${Math.round(params.years)} years · ${dollars(params.initialInvestment)}</div><div>Fee: ${params.directIndexFee.toFixed(2)}%</div><div>Tracking error: ${params.trackingError.toFixed(1)}%</div><div>Volatility: ${params.volatility.toFixed(1)}%</div><div>PV tax discount rate: ${params.discountRate.toFixed(1)}%</div></div></div></header><div class="layout"><aside class="stack no-print"><section class="card translucent preset-card">${sectionHeader("Scenario presets","Start with a realistic case, then tune the dials.","Presets change assumptions only. They do not represent recommendations.")}<div class="preset-grid">${PRESETS.map(p=>`<button class="preset-tile" data-preset="${p.id}"><strong>${p.name}</strong><span>${p.desc}</span></button>`).join("")}</div></section><section class="card translucent"><div class="section-head"><div><h2 class="section-title">${label("Core inputs","These assumptions drive the expected return path, tracking range, tax timing, and opportunity to harvest losses.")}</h2><p class="section-subtitle">Simple mode keeps the client conversation focused.</p></div><button class="reset" id="resetBtn">Reset</button></div><div class="controls">${slider("initialInvestment","Initial investment",100000,10000000,50000,"","$","Starting taxable portfolio value. Larger portfolios create larger dollar effects from the same return and tax assumptions.")}${slider("years","Time horizon",1,30,1," yrs","","The number of years the client holds the strategy. Longer horizons make compounding and tax deferral more visible.")}${slider("benchmarkReturn","Benchmark return",-5,15,.25,"%","","Expected annual pre-tax benchmark return. Volatility does not change this expected return.")}${slider("directIndexFee","Direct indexing fee",0,1,.01,"%","","Explicit annual fee or program cost. Default is 0.10%, or 10 bps.")}${slider("volatility","Benchmark volatility",3,35,.5,"%","","A simplified annual volatility assumption. Higher volatility increases expected harvestable losses and widens the tax-alpha range.")}${slider("trackingError","Tracking error",0,6,.1,"%","","Annualized active risk versus the benchmark. It widens the pre-tax and after-tax range but is not expected return by itself.")}${slider("ltTaxRate","Long-term tax rate",0,45,.25,"%","","Combined long-term capital gains tax rate assumption, including federal, state, and surtax if relevant.")}${slider("stTaxRate","Short-term / ordinary tax rate",0,55,.25,"%","","Combined short-term capital gains or ordinary income tax rate used to value short-term loss benefits.")}${toggle("includeLossHarvesting","Include loss harvesting","Turns on current tax savings from harvested losses. Harvesting also lowers tax basis, which may create larger future gains.")}${toggle("terminalLiquidation","End-period liquidation tax","Stress test that assumes the portfolio is sold at the end of the period and embedded gains are taxed.")}</div></section><section class="card translucent ${advancedClass}">${sectionHeader("Advanced portfolio inputs","Use these when an advisor wants more control.","Advanced inputs handle implementation drag, discounting, contributions, withdrawals, embedded gains, and realized-gain assumptions.")}<div class="controls">${slider("discountRate","Tax deferral discount rate",0,12,.25,"%","","Used only to show the present value of future taxes. It does not change the investment return path.")}${slider("implementationDrag","Implementation drag",0,1,.01,"%","","Additional expected annual drag from implementation, sampling, cash, or trading friction, separate from the explicit fee.")}${slider("activeTiltAlpha","Active tilt alpha / drag",-2.5,2.5,.05,"%","","Expected annual return impact from intentional active tilts. Positive values help pre-tax return; negative values hurt it.")}${slider("benchmarkRealizedGains","Benchmark realized gains",0,10,.25,"%","","Annual taxable realized gains as a percent of portfolio value for the benchmark. Higher values create more taxes for the benchmark to overcome.")}${slider("annualContribution","Annual contribution",0,500000,10000,"","$","New cash added at the beginning of each year. Contributions increase value and basis.")}${slider("annualWithdrawal","Annual withdrawal",0,500000,10000,"","$","Cash taken out each year. Withdrawals can realize taxable gains if the portfolio has embedded appreciation.")}${slider("startingEmbeddedGainPct","Starting embedded gain/loss",-20,80,1,"%","","Starting unrealized gain as a percent of portfolio value. Negative values represent an embedded loss or high basis.")}</div></section><section class="card translucent ${advancedClass}">${sectionHeader("Advanced tax levers","Separate harvesting, deferral, and transition limits.","These controls show how much of the after-tax benefit comes from harvested losses, avoided gains, tax rates, and gain budgets.")}<div class="controls">${slider("harvestOpportunity","Base harvest opportunity at 15% volatility",0,10,.25,"%","","Modeled annual harvested losses as a percent of portfolio value when volatility is 15%. The volatility dial scales this up or down.")}${selectControl("harvestCalibration","Harvest calibration",[{value:"conservative",label:"Conservative"},{value:"balanced",label:"Balanced"},{value:"optimistic",label:"Optimistic"}],"Simple calibration factor for the volatility-to-harvesting assumption. Use conservative when you want a less aggressive tax-alpha estimate.")}${slider("lossUtilization","Loss utilization",0,100,5,"%","","Percent of harvested losses assumed useful to the client through gains, income offsets, or carryforwards.")}${slider("shortTermLossShare","Losses used at short-term rate",0,100,5,"%","","Share of useful losses valued at the short-term or ordinary income tax rate. Higher short-term use usually means larger current tax benefit.")}${toggle("includeGainDeferral","Include gain deferral","Turns on tax-aware trading that avoids some annual realized gains relative to the benchmark.")}${slider("gainDeferral","Gain deferral rate",0,100,5,"%","","Percent of benchmark-like annual realized gains avoided by the direct index. Deferred gains may still be taxed later.")}${toggle("gainBudgetEnabled","Use realized-gain budget","Caps annual realized gains in the direct index. This is useful for transition-aware cases with legacy holdings.")}${slider("gainBudgetPct","Annual gain budget",0,5,.25,"%","","Maximum direct-index realized gains as a percent of portfolio value when the gain-budget toggle is on.")}${toggle("reinvestTaxSavings","Reinvest tax savings","When on, harvested-loss tax savings are added back to the portfolio and compound. When off, they are counted as outside cash.")}</div></section></aside><main class="stack"><section class="metrics">${metric("Pre-tax DI vs benchmark",pct(result.pretaxActiveReturn),`${dollars(endingPretaxGap)} expected ending pre-tax gap`,result.pretaxActiveReturn>=0,"Annualized pre-tax return difference between the direct index and benchmark. This strips out taxes.")}${metric("Post-tax DI vs benchmark",pct(result.afterTaxActiveReturn),`${dollars(endingAfterTaxGap)} expected ending after-tax gap`,result.afterTaxActiveReturn>=0,"Annualized after-tax return difference between the direct index and benchmark after annual taxes and optional liquidation tax.")}${metric("Expected tax alpha",pct(result.taxAlpha),`${dollars(taxAlphaDollars)} contribution after removing pre-tax gap`,result.taxAlpha>=0,"Post-tax relative return minus pre-tax relative return. This isolates the modeled contribution from tax management.")}${metric("PV tax advantage",dollars(result.pvTaxAdvantage),`Discounts taxes at ${params.discountRate.toFixed(2)}%.`,result.pvTaxAdvantage>=0,"Present value difference in total modeled tax burden. This highlights the economic value of paying taxes later instead of earlier.")}${metric("Tax alpha range",taxAlphaRangeText,"Combined tracking-error and volatility range.",undefined,"Range of measured tax alpha across simplified low/high tracking-error and harvesting scenarios.")}${metric("Break-even tax alpha",pct(breakEvenTaxAlpha),`Modeled tax alpha ${pct(result.taxAlpha)}; cushion after fee/drag ${pct(taxAlphaAfterFee)}.`,result.taxAlpha>=breakEvenTaxAlpha,"Tax alpha needed to overcome explicit fee, implementation drag, and active-tilt drag.")}</section><section class="card">${sectionHeader("Scenario summary","Plain-English explanation for advisor/client conversations.","This summary updates automatically based on the selected assumptions.")}${buildStory(params,result,endingAfterTaxGap,taxAlphaDollars,lossValue,deferralValue)}</section><section class="card">${sectionHeader("Tax alpha return bridge",`Shown for: ${scenarioLabel(bridgeScenario)}. Use the buttons below to show how tracking error changes the bridge.`,"The bridge uses annualized return differences. Tax alpha is the gap between post-tax relative return and pre-tax relative return.")}${scenarioPicker()}${returnBridgeChart(bridgeResult.pretaxActiveReturn,bridgeResult.taxAlpha,bridgeResult.afterTaxActiveReturn)}${returnBridgeRangeTable(result,downsideTracking,upsideTracking,lowHarvesting,highHarvesting)}</section><div class="two-col"><section class="card">${sectionHeader("Fee versus tax alpha","Shows whether modeled tax alpha clears the explicit fee and implementation hurdle.","This separates the 10 bps default fee from other pre-tax drag and from tax alpha.")}${feeAlphaBridgeChart(params,result)}</section><section class="card">${sectionHeader("Client fit checklist","Quick read on whether the assumptions are favorable for direct indexing.","This is a qualitative screen, not a recommendation.")}${fitChecklist(params,result)}</section></div><div class="two-col"><section class="card">${sectionHeader("Tax drag comparison","Direct indexing is often about reducing tax drag, not creating magic investment alpha.","Tax drag is after-tax CAGR minus pre-tax CAGR. Less negative tax drag means more of the return was kept after tax.")}${taxDragChart(result)}</section><section class="card">${sectionHeader("Liquidation versus continued deferral","Exit plan matters. A future tax bill is not the same as taxes paid every year.","This compares a full sale at the horizon with continued deferral at the horizon.")}${comparisonCards(withLiquidation,withoutLiquidation)}</section></div><section class="card">${sectionHeader("Benefit decomposition",`Dollar bridge for: ${scenarioLabel(bridgeScenario)}.`,"Use the scenario buttons in the Tax Alpha Return Bridge to choose whether this chart shows expected, downside tracking, upside tracking, low harvesting, or high harvesting.")}${benefitWaterfall(bridgeResult,bridgeEndingPretaxGap,bridgeTaxAlphaDollars)}<div class="soft-box"><strong>Tracking-error note:</strong> tracking error does not change the expected case, but it does change the downside/upside tracking cases. Select those bridge scenarios above to see this decomposition move with the tracking-error dial.</div></section><div class="two-col"><section class="card">${sectionHeader("Pre-tax tracking error band","Tracking error widens the range around expected direct indexing pre-tax wealth.","The shaded band is a one-standard-deviation relative return range around the expected direct index path.")}${trackingBandChart(result.rows)}</section><section class="card">${sectionHeader("After-tax wealth and combined outcome band","The green band combines tracking-error dispersion with lower/higher harvesting outcomes.","This band combines both investment tracking outcomes and tax-harvesting outcomes, so it is broader than the pre-tax tracking band alone.")}${wealthChart(result.rows,lowResult.rows,highResult.rows)}</section></div><div class="two-col"><section class="card">${sectionHeader("Cumulative tax burden over time","Shows how tax timing differs between the benchmark and direct index.","This includes annual taxes and, if toggled on, the end-period liquidation tax at each horizon.")}${taxPaidChart(result.rows)}</section><section class="card">${sectionHeader("Losses used now versus taxes later","Separates current harvested-loss value from possible future tax recapture.","Harvesting can create current tax value while reducing basis. The net benefit depends on tax rates, timing, and whether the portfolio is eventually sold.")}${lossTimingChart(result)}</section></div><div class="lever-grid"><section class="card">${sectionHeader("Power of each tax lever","Incremental ending after-tax dollars from turning on each lever.","This separates the two main engines: current-year value from harvesting losses and future value from deferring realized gains.")}<div class="lever-content"><div>${barBreakdown(lossValue,deferralValue)}</div><div class="mini-stack"><div class="soft-box"><strong>Loss harvesting:</strong> ${dollars(lossValue)} ${info("Incremental ending after-tax wealth from turning loss harvesting on, holding gain deferral on.")}</div><div class="soft-box"><strong>Gain deferral:</strong> ${dollars(deferralValue)} ${info("Incremental ending after-tax wealth from turning gain deferral on, holding loss harvesting on.")}</div><div class="soft-box"><strong>Expected annual harvest opportunity:</strong> ${pct(result.effectiveHarvestOpportunity,2)} ${info("Modeled harvested losses as a percent of portfolio value after scaling the base assumption by volatility.")}</div><div class="soft-box"><strong>Volatility-driven harvest range:</strong> ${pct(lowResult.effectiveHarvestOpportunity,2)} to ${pct(highResult.effectiveHarvestOpportunity,2)} ${info("Low-to-high range around expected harvesting opportunity. This is a simple assumption, not a prediction.")}</div></div></div></section><section class="card">${sectionHeader("Outcome bridge","Useful for advisor/client conversations.","This table converts the charts into dollar and annualized return terms.")}<div class="table-wrap"><table><thead><tr><th>Measure</th><th class="right">Benchmark</th><th class="right">Direct index</th><th class="right">Difference</th></tr></thead><tbody><tr><td class="bold">Pre-tax ending value ${info("Portfolio value before any annual or end-period taxes.")}</td><td class="right">${dollars(result.benchmarkPretax)}</td><td class="right">${dollars(result.directPretax)}</td><td class="right bold">${dollars(endingPretaxGap)}</td></tr><tr><td class="bold">After-tax ending value ${info("Portfolio value after modeled annual taxes and optional end-period liquidation tax.")}</td><td class="right">${dollars(result.benchmarkAfterTaxEnd)}</td><td class="right">${dollars(result.directAfterTaxEnd)}</td><td class="right bold">${dollars(endingAfterTaxGap)}</td></tr><tr><td class="bold">Direct after-tax range ${info("Range across simplified low/high tracking-error and harvesting scenarios.")}</td><td class="right">-</td><td class="right">${dollars(lowResult.directAfterTaxEnd)} to ${dollars(highResult.directAfterTaxEnd)}</td><td class="right bold">Tax alpha: ${taxAlphaRangeText}</td></tr><tr><td class="bold">Pre-tax CAGR ${info("Annualized return before taxes.")}</td><td class="right">${pct(result.benchmarkPretaxCagr)}</td><td class="right">${pct(result.directPretaxCagr)}</td><td class="right bold">${pct(result.pretaxActiveReturn)}</td></tr><tr><td class="bold">After-tax CAGR ${info("Annualized return after taxes.")}</td><td class="right">${pct(result.benchmarkAfterTaxCagr)}</td><td class="right">${pct(result.directAfterTaxCagr)}</td><td class="right bold">${pct(result.afterTaxActiveReturn)}</td></tr><tr><td class="bold">PV of total tax burden ${info("Present value of annual taxes plus end-period liquidation tax, less harvesting tax savings for the direct index.")}</td><td class="right">${dollars(result.pvBenchmarkTotalTaxes)}</td><td class="right">${dollars(result.pvDirectTotalTaxes)}</td><td class="right bold">${dollars(result.pvTaxAdvantage)}</td></tr><tr><td class="bold">Annual realized-gain taxes ${info("Nominal annual taxes from realized gains over the full horizon. This excludes end-period liquidation tax.","up")}</td><td class="right">${dollars(result.totalBenchmarkAnnualTax)}</td><td class="right">${dollars(result.totalDirectAnnualTax)}</td><td class="right bold">${dollars(result.totalBenchmarkAnnualTax-result.totalDirectAnnualTax)}</td></tr><tr><td class="bold">End-period liquidation tax ${info("Estimated tax due if the entire portfolio is sold at the end of the period.","up")}</td><td class="right">${dollars(result.terminalBenchmarkTax)}</td><td class="right">${dollars(result.terminalDirectTax)}</td><td class="right bold">${dollars(result.terminalBenchmarkTax-result.terminalDirectTax)}</td></tr></tbody></table></div></section></div><section class="card">${sectionHeader("Plain-English advisor talking points","Designed to keep the explanation honest and simple.","These are phrased for advisor/client conversations, not as investment recommendations.")}<div class="talking-points"><div class="soft-box"><strong>Tracking error flows through to after-tax wealth.</strong><br>It widens the pre-tax range and the after-tax outcome range. It is not tax alpha by itself, but it changes the taxable path the client experiences.</div><div class="soft-box"><strong>Volatility powers the harvesting range.</strong><br>At ${params.volatility.toFixed(1)}% volatility, expected harvest opportunity is ${pct(result.effectiveHarvestOpportunity,2)}, with a range of ${pct(lowResult.effectiveHarvestOpportunity,2)} to ${pct(highResult.effectiveHarvestOpportunity,2)}.</div><div class="soft-box"><strong>Gain deferral is quiet but powerful.</strong><br>Avoided annual realized-gain taxes stay invested. Even when taxes are eventually paid, a future tax bill is worth less than the same tax paid today.</div></div></section><section class="card">${sectionHeader("Disclosures and model limitations","Keep this visible before using the output with advisors or clients.","This section is intentionally explicit to reduce overpromising.")}<div class="disclosure-grid"><div class="disclaimer"><strong>Educational illustration only.</strong><br>This simplified model is hypothetical and is not investment, tax, legal, or accounting advice.</div><div class="disclaimer"><strong>Tax benefits are not guaranteed.</strong><br>Losses must be available and usable. Wash-sale rules, client tax facts, and tax law changes can materially change outcomes.</div><div class="disclaimer"><strong>Tracking error can help or hurt.</strong><br>The tool shows ranges, but actual security-level dispersion, cash flows, transition taxes, and implementation costs may differ.</div><div class="disclaimer"><strong>Deferral is path-dependent.</strong><br>Future liquidation, charitable giving, estate treatment, account transitions, and withdrawals can change the value of deferral.</div></div></section></main></div></div>`;attachEvents();}
    function attachEvents(){document.querySelectorAll("input[data-key]").forEach(input=>input.addEventListener("input",e=>{params[e.target.dataset.key]=Number(e.target.value);shareMessage="";render()}));document.querySelectorAll("select[data-select]").forEach(sel=>sel.addEventListener("change",e=>{params[e.target.dataset.select]=e.target.value;shareMessage="";render()}));document.querySelectorAll("button[data-toggle]").forEach(btn=>btn.addEventListener("click",e=>{const k=e.currentTarget.dataset.toggle;params[k]=!params[k];shareMessage="";render()}));document.querySelectorAll("button[data-mode]").forEach(btn=>btn.addEventListener("click",e=>{viewMode=e.currentTarget.dataset.mode;render()}));document.querySelectorAll("button[data-bridge-scenario]").forEach(btn=>btn.addEventListener("click",e=>{bridgeScenario=e.currentTarget.dataset.bridgeScenario;render()}));document.querySelectorAll("button[data-preset]").forEach(btn=>btn.addEventListener("click",e=>{const preset=PRESETS.find(x=>x.id===e.currentTarget.dataset.preset);if(!preset)return;params=preset.reset?{...DEFAULTS}:{...params,...preset.values};shareMessage=`Applied: ${preset.name}`;render()}));const reset=document.getElementById("resetBtn");if(reset)reset.addEventListener("click",()=>{params={...DEFAULTS};shareMessage="";render()});const copy=document.getElementById("copyLinkBtn");if(copy)copy.addEventListener("click",copyScenarioLink);const print=document.getElementById("printBtn");if(print)print.addEventListener("click",()=>window.print())}
    loadScenarioFromHash();
